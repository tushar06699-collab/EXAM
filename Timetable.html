  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script>
const EXAM_API = String(
    localStorage.getItem("examApiBaseUrl") || "https://exam-backend-117372286918.asia-south1.run.app/"
).replace(/\/+$/, "");
const STUDENT_API = String(
    localStorage.getItem("studentApiBaseUrl") || "https://student-backend-117372286918.asia-south1.run.app/"
).replace(/\/+$/, "");

let classes = [];
let subjectsByClass = {};

const periods = ["Period 1","Period 2","Period 3","Period 4","Lunch","Period 5","Period 6","Period 7","Period 8"];
const periodMap = {"Period 1":1,"Period 2":2,"Period 3":3,"Period 4":4,"Period 5":5,"Period 6":6,"Period 7":7,"Period 8":8};
  const weekDays = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const periodCols = ["Period 1","Period 2","Period 3","Period 4","Period 5","Period 6","Period 7","Period 8"];

const timetableBody = document.getElementById("timetableBody");
const sessionSelect = document.getElementById("sessionSelect");
const teacherSelect = document.getElementById("teacherSelect");
const teacherNote = document.getElementById("teacherNote");
const periodChecks = document.getElementById("periodChecks");

function normalizeClassName(raw){
    return String(raw || "").trim().replace(/\s+/g, " ");
}

function isSeniorCombined(className){
    return /^(11|12)\s*COMBINED/i.test(className);
}

function isSeniorStream(className){
    return /^(11|12)(st|nd|rd|th)?\s*(Arts|Commerce|Medical)/i.test(String(className || "").trim());
}

function buildPeriodChecks(){
    if(!periodChecks) return;
    const labels = ["Period 1","Period 2","Period 3","Period 4","Period 5","Period 6","Period 7","Period 8"];
    periodChecks.innerHTML = labels.map(p => {
        const num = periodMap[p];
        return `<label style="display:flex;gap:4px;align-items:center;font-size:12px;">
            <input type="checkbox" class="periodCheck" value="${num}"> ${p}
        </label>`;
    }).join("");
}

  function getPreviousSessionName(sessionName){
    const m = String(sessionName || "").match(/^(\d+)_/);
    if(!m) return "";
    const start = parseInt(m[1], 10);
    if(!Number.isFinite(start)) return "";
    const prevStart = start - 1;
    const prevEnd = String(prevStart + 1).slice(-2);
    return `${prevStart}_${prevEnd}`;
  }

  function dayIndex(day){
      const map = {
          "mon":1,"monday":1,
          "tue":2,"tues":2,"tuesday":2,
          "wed":3,"wednesday":3,
          "thu":4,"thur":4,"thurs":4,"thursday":4,
          "fri":5,"friday":5,
          "sat":6,"saturday":6
      };
      return map[String(day||"").trim().toLowerCase()] || 0;
  }

  function parseDays(value){
      let raw = String(value || "").trim();
      if(!raw) return {startDay:1,endDay:1};
      raw = raw.replace(/[–—]/g, "-").replace(/\s+to\s+/i, "-");
      const parts = raw.split("-").map(s=>s.trim());
      if(parts.length === 2){
          const a = dayIndex(parts[0]);
          const b = dayIndex(parts[1]);
          if(a && b) return {startDay: Math.min(a,b), endDay: Math.max(a,b)};
      }
      const single = dayIndex(raw);
      if(single) return {startDay: single, endDay: single};
      return {startDay:1,endDay:1};
  }

  function parseTeacherWiseCell(cell){
      const raw = String(cell || "").trim();
      if(!raw) return [];
      const segments = raw.split(",").map(s=>s.trim()).filter(Boolean);
      const parsed = [];
      segments.forEach(seg => {
          const parts = seg.split("|").map(s=>s.trim());
          const className = parts[0] || "";
          const subject = parts[1] || "";
          const days = parts[2] || "";
          if(!className || !subject) return;
          const {startDay, endDay} = parseDays(days);
          const classParts = className.split("+").map(s=>s.trim()).filter(Boolean);
          if(classParts.length){
              classParts.forEach(cn => parsed.push({className: cn, subject, startDay, endDay}));
          }else{
              parsed.push({className, subject, startDay, endDay});
          }
      });
      return parsed;
  }

  function parseClassWiseCell(cell){
      const raw = String(cell || "").trim();
      if(!raw) return [];
      const segments = raw.split(",").map(s=>s.trim()).filter(Boolean);
      const parsed = [];
      segments.forEach(seg => {
          const parts = seg.split("|").map(s=>s.trim());
          const teacher = parts[0] || "";
          const subject = parts[1] || "";
          const days = parts[2] || "";
          if(!teacher || !subject) return;
          const {startDay, endDay} = parseDays(days);
          parsed.push({teacher, subject, startDay, endDay});
      });
      return parsed;
  }

// ----------------- Load Data -----------------
async function loadSessions() {
    try {
    const res = await fetch(`${EXAM_API}/session/list`);
    const data = await res.json();
    sessionSelect.innerHTML = data.sessions.map(s=>`<option value="${s}">${s}</option>`).join("");

    // FORCE_LATEST_SESSION
    if (Array.isArray(data.sessions) && data.sessions.length) {
        const latest = data.sessions[data.sessions.length - 1];
        if (latest) {
            localStorage.setItem('session', latest);
            sessionSelect.value = latest;
        }
    }
    } catch(e){
        console.error(e);
        sessionSelect.innerHTML = `<option value="2024_25">2024_25</option>`;
    }
}


async function loadTeachers() {
    try {
        const session = sessionSelect.value || "2024_25";
        // Prefer teachers who actually have timetables in this session
        const ttRes = await fetch(`${EXAM_API}/timetable/teachers?session=${encodeURIComponent(session)}`);
        const ttData = await ttRes.json().catch(()=>({}));
        const ttTeachers = Array.isArray(ttData.teachers) ? ttData.teachers : [];
        if (ttTeachers.length) {
            teacherSelect.innerHTML = ttTeachers.map(t=>`<option value="${t.id}">${t.name || t.id}</option>`).join("");
            teacherNote.textContent = "Showing teachers from timetable entries.";
            return;
        }

        const res = await fetch(`${EXAM_API}/teacher/list?session=${session}`);
        const data = await res.json();
        const teachers = Array.isArray(data.teachers) ? data.teachers : [];
        if (teachers.length) {
            teacherSelect.innerHTML = teachers.map(t=>`<option value="${t.id}">${t.name}</option>`).join("");
            teacherNote.textContent = "";
            return;
        }

        const prevSession = getPreviousSessionName(session);
        if (!prevSession) {
            teacherSelect.innerHTML = `<option value="">-- No teachers --</option>`;
            teacherNote.textContent = "No teachers found for current session.";
            return;
        }

        const prevRes = await fetch(`${EXAM_API}/teacher/list?session=${prevSession}`);
        const prevData = await prevRes.json();
        const prevTeachers = Array.isArray(prevData.teachers) ? prevData.teachers : [];
        teacherSelect.innerHTML = prevTeachers.map(t=>`<option value="${t.id}">${t.name}</option>`).join("");
        teacherNote.textContent = prevTeachers.length
            ? `No teachers in ${session}. Showing teachers from ${prevSession}.`
            : "No teachers found for current or previous session.";
    } catch(e) {
        console.error(e);
        teacherSelect.innerHTML = `<option value="">-- No teachers --</option>`;
        teacherNote.textContent = "Failed to load teachers.";
    }
}

  async function loadClasses() {
      timetableBody.innerHTML = `<tr><td colspan="4">Loading classes...</td></tr>`;

      try {
          const session = sessionSelect.value || "";
          const res = await fetch(`${STUDENT_API}/students?session=${encodeURIComponent(session)}&strict=1`);
          const students = await res.json();

        classes = [...new Set(students.map(s => s.class_name).filter(Boolean))];

        classes.sort((a,b)=>{
            const ma=a.match(/^(\d+)/), mb=b.match(/^(\d+)/);
            return (parseInt(ma?.[1]||0)) - (parseInt(mb?.[1]||0));
        });

        // AUTO ADD COMBINED FOR ANY CLASS WITH MULTIPLE SECTIONS / STREAMS
// AUTO ADD COMBINED ONLY IF MULTIPLE DISTINCT SECTIONS EXIST
const classMap = {};

// group classes by numeric prefix
classes.forEach(c => {
    const match = c.match(/^(\d+)/);
    if (!match) return;

    const num = match[1];
    if (!classMap[num]) classMap[num] = new Set();

    classMap[num].add(c); // Set removes duplicates automatically
});

// create COMBINED only if MORE THAN ONE UNIQUE CLASS
Object.entries(classMap).forEach(([num, set]) => {
    if (set.size > 1) {
        classes.unshift(`${num} COMBINED`);
    }
});

        timetableBody.innerHTML = "";
    } catch(e) {
        console.error(e);
        timetableBody.innerHTML = `<tr><td colspan="4">Failed to load classes</td></tr>`;
        classes = [];
    }
}

async function loadSubjects(className) {
    if(!className) return [];
    if(subjectsByClass[className]) return subjectsByClass[className];
    try {
        const res = await fetch(`${EXAM_API}/exam/subjects/get?session=${sessionSelect.value}&class_name=${className}`);
        const data = await res.json();
        subjectsByClass[className] = data.subjects || [];
        return subjectsByClass[className];
    } catch(e) {
        console.error(e);
        subjectsByClass[className] = [];
        return [];
    }
}

async function loadExistingTimetable() {
    const teacherId = teacherSelect.value;
    const session = sessionSelect.value;
    try {
        const res = await fetch(`${EXAM_API}/timetable/get?session=${session}&teacher_id=${teacherId}`);
        const data = await res.json();
        return data.timetable || [];
    } catch(e) {
        console.error(e);
        return [];
    }
}

async function fetchTimetable(session, teacherId){
    if(!session || !teacherId) return [];
    try{
        const res = await fetch(`${EXAM_API}/timetable/get?session=${session}&teacher_id=${teacherId}`);
        const data = await res.json();
        return data.timetable || [];
    }catch(e){
        console.error(e);
        return [];
    }
}

// ----------------- Get Used Days for Conflict -----------------
async function getUsedDays(className, periodNum) {
    if(!className) return [];
    try {
        const res = await fetch(`${EXAM_API}/timetable/used_days?session=${sessionSelect.value}&class_name=${className}&period=${periodNum}`);
        const data = await res.json();
        if(!data.success) return [];
        return data.used_days; // array of integers
    } catch(e) {
        console.error(e);
        return [];
    }
}

// ----------------- Generate Rows -----------------
async function generateRows(existing=[]) {
    timetableBody.innerHTML = "";

    for (let i=0; i<periods.length; i++) {
        const periodText = periods[i];
        if(periodText==="Lunch") {
            timetableBody.innerHTML += `<tr style="background:#f0f0f0; font-weight:bold;"><td colspan="4">Lunch</td></tr>`;
            continue;
        }
        const periodNum = periodMap[periodText];
        const periodRows = existing.filter(r => r.period==periodNum);

        // Existing blocks
        for(const r of periodRows){
            const subjectValue = weekDays.map(d=>r[d]).find(s=>s) || "";
            timetableBody.innerHTML += `<tr data-period="${periodNum}">
                <td>${periodText}</td>
                <td>
                    <select class="classSelect">
                        <option value="">Select Class</option>
                        ${classes.map(c=>`<option value="${c}" ${c===r.class?'selected':''}>${c}</option>`).join("")}
                    </select>
                </td>
                <td>
                    <select class="subjectSelect">
                        <option value="">Select Subject</option>
                        ${subjectValue?`<option value="${subjectValue}" selected>${subjectValue}</option>`:""}
                    </select>
                </td>
                <td>
                    <select class="startDay">
                        ${weekDays.map((day,d)=>`<option value="${d+1}" ${d+1===r.startDay?'selected':''}>${day.slice(0,3)}</option>`).join("")}
                    </select> -
                    <select class="endDay">
                        ${weekDays.map((day,d)=>`<option value="${d+1}" ${d+1===r.endDay?'selected':''}>${day.slice(0,3)}</option>`).join("")}
                    </select>
                </td>
            </tr>`;
        }

        // Free block for remaining days
        const usedDays = new Set();
        for(const r of periodRows){
            for(let d=r.startDay; d<=r.endDay; d++) usedDays.add(d);
        }

        const freeDays = weekDays.map((_,i)=>i+1).filter(d=>!usedDays.has(d));
        if(freeDays.length>0){
            const start = freeDays[0];
            const end = freeDays[freeDays.length-1];
            timetableBody.innerHTML += `<tr data-period="${periodNum}" class="freeBlock">
                <td>${periodText}</td>
                <td>
                    <select class="classSelect">
                        <option value="">Select Class</option>
                        ${classes.map(c=>`<option value="${c}">${c}</option>`).join("")}
                    </select>
                </td>
                <td>
                    <select class="subjectSelect">
                        <option value="">Select Subject</option>
                    </select>
                </td>
                <td>
                    <select class="startDay">
                        ${weekDays.map((day,d)=>`<option value="${d+1}" ${d+1===start?'selected':''}>${day.slice(0,3)}</option>`).join("")}
                    </select> -
                    <select class="endDay">
                        ${weekDays.map((day,d)=>`<option value="${d+1}" ${d+1===end?'selected':''}>${day.slice(0,3)}</option>`).join("")}
                    </select>
                </td>
            </tr>`;
        }
    }

    // Bind class change for dynamic subjects + day conflict check
    document.querySelectorAll(".classSelect").forEach(sel=>{
        const tr = sel.closest("tr");
        const subjSel = tr.querySelector(".subjectSelect");
        const startDaySel = tr.querySelector(".startDay");
        const endDaySel = tr.querySelector(".endDay");

        sel.onchange = async function(){
            
            subjSel.innerHTML = `<option value="">Select Subject</option>`;
            if(!this.value) return;
        
            let subjectClass = this.value;
        
            // MAP COMBINED → REAL CLASS
            const match = this.value.match(/^(\d+)/);
if(this.value.includes("COMBINED") && match){
    subjectClass = classes.find(c =>
        c.startsWith(match[1]) &&
        /(Arts|Commerce|Medical)/i.test(c)
    ) || classes.find(
        c => c.startsWith(match[1]) && !c.includes("COMBINED")
    );
}


        
            if(subjectClass){
                const subjects = await loadSubjects(subjectClass);
                subjSel.innerHTML += subjects.map(s=>`<option value="${s}">${s}</option>`).join("");
            }
        
            const periodNum = parseInt(tr.dataset.period);
let used = [];

//  DO NOT CHECK CONFLICT FOR 11/12 STREAMS OR COMBINED
if(
    !isSeniorStream(this.value) &&
    !isSeniorCombined(this.value)
){
    used = await getUsedDays(subjectClass, periodNum);
}
            const available = weekDays.map((_,i)=>i+1).filter(d=>!used.includes(d));
        
            if(available.length===0){
                alert("Class already filled for this period!");
                startDaySel.innerHTML = `<option value="">N/A</option>`;
                endDaySel.innerHTML = `<option value="">N/A</option>`;
            } else {
                startDaySel.innerHTML = available.map(d=>`<option value="${d}">${weekDays[d-1].slice(0,3)}</option>`).join("");
                endDaySel.innerHTML = startDaySel.innerHTML;
            }
        };
    });
}

// ----------------- Save Timetable -----------------
document.getElementById("saveBtn").onclick = async ()=>{
    const teacherId = teacherSelect.value;
    const session = sessionSelect.value;
    const timetable = [];
    const periodOneClasses = new Set();
    const teacherName = teacherSelect.options[teacherSelect.selectedIndex]?.text?.trim() || "";

    document.querySelectorAll('tbody tr[data-period]').forEach(row=>{
    const periodText = row.children[0].textContent.trim();
    const periodNum = periodMap[periodText];
    const selClass = row.querySelector(".classSelect");
    const subjSel = row.querySelector(".subjectSelect");
    const startDay = parseInt(row.querySelector(".startDay").value || 1);
    const endDay = parseInt(row.querySelector(".endDay").value || 1);

    if(!selClass || !subjSel) return;
    if(!selClass.value || !subjSel.value) return;

    let targetClasses = [];

    // EXPAND COMBINED
    const match = selClass.value.match(/^(\d+)/);

if(selClass.value.includes("COMBINED") && match){
    targetClasses = classes.filter(
        c => c.startsWith(match[1]) && !c.includes("COMBINED")
    );
} else {
    targetClasses = [selClass.value];
}
    

    targetClasses.forEach(className=>{
        const periodData = { period: periodNum, class: className, startDay, endDay };
        weekDays.forEach((day, idx)=>{
            periodData[day] = (idx+1>=startDay && idx+1<=endDay) ? subjSel.value : "";
        });
        timetable.push(periodData);
        if (periodNum === 1) {
            periodOneClasses.add(normalizeClassName(className));
        }
    });
});
    
    
    try{
        const res = await fetch(`${EXAM_API}/timetable/set`,{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({session, teacher_id:teacherId, timetable})
        });
        const data = await res.json();
        if (res.ok && teacherName && periodOneClasses.size) {
            const jobs = [...periodOneClasses].map(className => fetch(`${EXAM_API}/incharge/set`, {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({
                    session,
                    class_name: className,
                    incharge: teacherName
                })
            }).catch(() => null));
            await Promise.all(jobs);
        }
        alert(data.message || "Saved successfully!");
        const existing = await loadExistingTimetable();
        await generateRows(existing);
    }catch(e){
        console.error(e);
        alert("Error saving timetable");
    }
};

// ----------------- Clear Timetable Periods -----------------
async function clearPeriods({all=false} = {}){
    const teacherId = teacherSelect.value;
    const session = sessionSelect.value;
    if(!teacherId || !session){
        alert("Select session and teacher first");
        return;
    }
    const existing = await loadExistingTimetable();
    let filtered = [];
    if(all){
        filtered = [];
    }else{
        const selected = [...document.querySelectorAll(".periodCheck:checked")].map(c => parseInt(c.value,10)).filter(Boolean);
        if(!selected.length){
            alert("Select at least one period to clear.");
            return;
        }
        filtered = existing.filter(r => !selected.includes(parseInt(r.period,10)));
    }

    if(!confirm(all ? "Clear ALL periods for this teacher?" : "Clear selected periods for this teacher?")) return;

    try{
        const res = await fetch(`${EXAM_API}/timetable/set`,{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({session, teacher_id:teacherId, timetable: filtered})
        });
        const data = await res.json();
        alert(data.message || "Cleared successfully!");
        const refreshed = await loadExistingTimetable();
        await generateRows(refreshed);
    }catch(e){
        console.error(e);
        alert("Failed to clear periods.");
    }
}

document.getElementById("copyPrevBtn").onclick = async ()=>{
    const teacherId = teacherSelect.value;
    const currentSession = sessionSelect.value;
    if(!teacherId || !currentSession){
        alert("Select session and teacher first");
        return;
    }
    const prevSession = getPreviousSessionName(currentSession);
    if(!prevSession){
        alert("Previous session not found");
        return;
    }
    if(!confirm(`Copy timetable from ${prevSession} to ${currentSession} for this teacher?`)) return;

    const prevTimetable = await fetchTimetable(prevSession, teacherId);
    if(!prevTimetable.length){
        alert("No timetable found in previous session");
        return;
    }
    const payload = prevTimetable.map(r => ({
        period: r.period,
        class: r.class || "",
        Monday: r.Monday || "",
        Tuesday: r.Tuesday || "",
        Wednesday: r.Wednesday || "",
        Thursday: r.Thursday || "",
        Friday: r.Friday || "",
        Saturday: r.Saturday || "",
        startDay: r.startDay || 1,
        endDay: r.endDay || 1
    }));
    try{
        const res = await fetch(`${EXAM_API}/timetable/set`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                session: currentSession,
                teacher_id: teacherId,
                timetable: payload
            })
        });
        const data = await res.json().catch(()=>({}));
        if(!res.ok || data.success === false){
            alert(data.message || "Failed to copy timetable");
            return;
        }
        alert("Timetable copied from previous session.");
        const existing = await loadExistingTimetable();
        await generateRows(existing);
    }catch(e){
        console.error(e);
        alert("Failed to copy timetable");
    }
};

document.getElementById("copyPrevAllBtn").onclick = async ()=>{
    const currentSession = sessionSelect.value;
    if(!currentSession){
        alert("Select session first");
        return;
    }
    const prevSession = getPreviousSessionName(currentSession);
    if(!prevSession){
        alert("Previous session not found");
        return;
    }
    if(!confirm(`Copy ALL timetables from ${prevSession} to ${currentSession}?`)) return;

    try{
        const prevRes = await fetch(`${EXAM_API}/teacher/list?session=${prevSession}`);
        const prevData = await prevRes.json().catch(()=>({}));
        const prevTeachers = Array.isArray(prevData.teachers) ? prevData.teachers : [];
        if(!prevTeachers.length){
            alert("No teachers found in previous session");
            return;
        }

        let copied = 0;
        for (const t of prevTeachers) {
            const prevTimetable = await fetchTimetable(prevSession, t.id);
            if(!prevTimetable.length) continue;

            const payload = prevTimetable.map(r => ({
                period: r.period,
                class: r.class || "",
                Monday: r.Monday || "",
                Tuesday: r.Tuesday || "",
                Wednesday: r.Wednesday || "",
                Thursday: r.Thursday || "",
                Friday: r.Friday || "",
                Saturday: r.Saturday || "",
                startDay: r.startDay || 1,
                endDay: r.endDay || 1
            }));

            await fetch(`${EXAM_API}/timetable/set`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    session: currentSession,
                    teacher_id: t.id,
                    timetable: payload
                })
            });
            copied += 1;
        }

        alert(`Copied timetable for ${copied} teachers.`);
        await loadTeachers();
        const existing = await loadExistingTimetable();
        await generateRows(existing);
    }catch(e){
        console.error(e);
        alert("Failed to copy full timetable");
    }
};

  document.getElementById("downloadFormatBtn").onclick = async () => {
      const teacherName = teacherSelect.options[teacherSelect.selectedIndex]?.text?.trim() || "Teacher";
      const wb = XLSX.utils.book_new();

      // Sheet 1: Teacher-wise (rows = teachers)
      const header = ["Teacher", ...periodCols];
      const rows = [header];
      let teacherRows = [];
      try{
          const ses = sessionSelect.value || "";
          const examRes = await fetch(`${EXAM_API}/teacher/list?session=${encodeURIComponent(ses)}`);
          const examData = await examRes.json().catch(()=>({}));
          const examTeachers = Array.isArray(examData.teachers) ? examData.teachers : [];
          const examNames = examTeachers.map(t=>t.name || t.teacher_name || t.id || "").filter(Boolean);

          const stuRes = await fetch(`${STUDENT_API}/teachers?session=${encodeURIComponent(ses)}`);
          const stuData = await stuRes.json().catch(()=>({}));
          const stuTeachers = Array.isArray(stuData) ? stuData : (Array.isArray(stuData.teachers) ? stuData.teachers : []);
          const stuNames = stuTeachers.map(t=>t.teacher_name || t.name || t.employee_id || t.teacher_code || "").filter(Boolean);

          if(stuNames.length > examNames.length){
              teacherRows = stuNames;
          }else{
              teacherRows = examNames;
          }
      }catch(e){
          teacherRows = [];
      }
      if(!teacherRows.length){
          teacherRows = Array.from(teacherSelect.options).map(o => o.text || "").filter(Boolean);
      }
      teacherRows.forEach(tName => {
          const row = [tName];
          periodCols.forEach(() => row.push(""));
          rows.push(row);
      });
      const ws1 = XLSX.utils.aoa_to_sheet(rows);
      XLSX.utils.book_append_sheet(wb, ws1, "TeacherWise");

      // Sheet 2: Class-wise
      const rows2 = [header];
      classes.forEach(cls => {
          const row = [cls];
          periodCols.forEach(() => row.push(""));
          rows2.push(row);
      });
      const ws2 = XLSX.utils.aoa_to_sheet(rows2);
      XLSX.utils.book_append_sheet(wb, ws2, "ClassWise");

      // Sheet 3: Guide
      const guide = [
          ["Format Guide"],
          ["TeacherWise sheet:"],
          ["Cell format: Class | Subject | Mon-Wed  (e.g., 9th | Maths | Mon-Fri)"],
          ["Multiple slots in one cell: separate with commas (e.g., 2nd | DRAWING | Mon-Wed, 2nd | SPORTS | Thu-Sat)"],
          ["Multi-class in one slot: use + (e.g., 11th Commerce + 11th Medical | HINDI | Mon-Sat)"],
          ["ClassWise sheet:"],
          ["Cell format: Teacher Name | Subject | Mon-Wed  (e.g., MR. AJAY | Maths | Tue-Thu)"],
          ["Multiple slots in one cell: separate with commas (e.g., MR. AJAY | Maths | Mon-Wed, MR. AJAY | Sports | Thu-Sat)"],
          ["Days accepted: Mon, Tue, Wed, Thu, Fri, Sat (or full names)."],
          ["Note: Lunch period is not included in the format."],
          ["Selected Teacher:", teacherName],
          ["Selected Session:", sessionSelect.value || ""]
      ];
      const ws3 = XLSX.utils.aoa_to_sheet(guide);
      XLSX.utils.book_append_sheet(wb, ws3, "Guide");

      XLSX.writeFile(wb, `timetable_format_${sessionSelect.value || "session"}.xlsx`);
  };

  // ----------------- Excel Upload -----------------
  document.getElementById("uploadExcelBtn").onclick = async () => {
      const fileInput = document.getElementById("timetableFile");
      const file = fileInput.files[0];
      if(!file) return alert("Select Excel file first");
      const reader = new FileReader();
      reader.onload = async (e) => {
          const data = new Uint8Array(e.target.result);
          const wb = XLSX.read(data, {type:"array"});

          const teacherSheet = wb.Sheets["TeacherWise"];
          const classSheet = wb.Sheets["ClassWise"];
          if(!teacherSheet && !classSheet){
              alert("No TeacherWise or ClassWise sheet found.");
              return;
          }

          const session = sessionSelect.value;
          if(!session) return alert("Select session first");

          // Build teacher lookup
          const tRes = await fetch(`${EXAM_API}/teacher/list?session=${encodeURIComponent(session)}`);
          const tData = await tRes.json().catch(()=>({}));
          const tRows = Array.isArray(tData.teachers) ? tData.teachers : [];
          const teacherByName = new Map();
          tRows.forEach(t=>{
              teacherByName.set(String(t.name||"").trim().toLowerCase(), t.id);
          });
          const teacherNameToId = new Map(teacherByName);

          // Also fetch teachers from student backend for matching by name.
          let studentTeachers = [];
          try{
              const sRes = await fetch(`${STUDENT_API}/teachers?session=${encodeURIComponent(session)}`);
              const sData = await sRes.json().catch(()=>({}));
              studentTeachers = Array.isArray(sData) ? sData : (Array.isArray(sData.teachers) ? sData.teachers : []);
              studentTeachers.forEach(t=>{
                  const n = String(t.teacher_name || t.name || "").trim().toLowerCase();
                  if(n && !teacherNameToId.has(n)){
                      teacherNameToId.set(n, null);
                  }
              });
          }catch(e){
              studentTeachers = [];
          }

          function normalizeTeacherCode(v){
              const txt = String(v || "").trim();
              if(!txt) return "";
              const digits = txt.replace(/\D/g, "");
              return digits ? digits.padStart(4,"0").slice(-4) : "";
          }

          async function resolveTeacherIdByName(name){
              const key = String(name||"").trim().toLowerCase();
              if(!key) return null;
              if(teacherByName.has(key)) return teacherByName.get(key);
              // If teacher exists in student backend but not in exam backend, create in exam backend.
              const sRow = studentTeachers.find(t => String(t.teacher_name || t.name || "").trim().toLowerCase() === key);
              if(!sRow) return null;
              try{
                  const teacherCode = normalizeTeacherCode(sRow.teacher_code || sRow.teacher_id || sRow.employee_id);
                  const username = String(sRow.employee_id || sRow.teacher_code || sRow.teacher_name || sRow.name || name).trim().toUpperCase().replace(/\s+/g,"");
                  const dob = String(sRow.dob || sRow.date_of_birth || "").trim();
                  const password = dob ? `${username}@${dob}` : `${username}@0000`;
                  const payload = {
                      session,
                      username,
                      password,
                      name: sRow.teacher_name || sRow.name || name,
                      teacher_id: teacherCode
                  };
                  const res = await fetch(`${EXAM_API}/teacher/add`, {
                      method:"POST",
                      headers:{"Content-Type":"application/json"},
                      body: JSON.stringify(payload)
                  });
                  const data = await res.json().catch(()=>({}));
                  if(res.ok && data && data.success){
                      // refresh list to get new id
                      const r2 = await fetch(`${EXAM_API}/teacher/list?session=${encodeURIComponent(session)}`);
                      const d2 = await r2.json().catch(()=>({}));
                      const rows2 = Array.isArray(d2.teachers) ? d2.teachers : [];
                      const match = rows2.find(t => String(t.name||"").trim().toLowerCase() === key);
                      if(match){
                          teacherByName.set(key, match.id);
                          return match.id;
                      }
                  }
              }catch(e){}
              return null;
          }

          const conflicts = [];
          const teacherDayPeriod = new Map(); // key: teacherId|day|period -> class
          const saveRequests = [];

          const addEntry = (teacherId, className, periodNum, startDay, endDay, subject) => {
              for(let d=startDay; d<=endDay; d++){
                  const key = `${teacherId}|${d}|${periodNum}`;
                  const existing = teacherDayPeriod.get(key);
                  if(existing && existing !== className){
                      // Allow multiple senior stream classes (11th/12th Arts/Commerce/Medical) in same slot.
                      if(isSeniorStream(existing) && isSeniorStream(className)){
                          // no conflict
                      }else{
                          conflicts.push(`Teacher conflict: ${teacherId} on day ${d} period ${periodNum} (${existing} vs ${className})`);
                      }
                  }else{
                      teacherDayPeriod.set(key, className);
                  }
              }
          };
          const classDayPeriod = new Map(); // key: class|day|period -> teacher
          const addClassEntry = (teacherId, className, periodNum, startDay, endDay, teacherName) => {
              for(let d=startDay; d<=endDay; d++){
                  const key = `${className}|${d}|${periodNum}`;
                  const existing = classDayPeriod.get(key);
                  if(existing && existing !== teacherName){
                      // Allow multiple senior stream classes (11th/12th Arts/Commerce/Medical) in same slot.
                      if(isSeniorStream(className)){
                          // no conflict
                      }else{
                          conflicts.push(`Class conflict: ${className} day ${d} period ${periodNum} (${existing} vs ${teacherName})`);
                      }
                  }else{
                      classDayPeriod.set(key, teacherName);
                  }
              }
          };

          const sheetHasData = (rows) => {
              for(let r=1; r<rows.length; r++){
                  const row = rows[r] || [];
                  for(let c=1; c<=periodCols.length; c++){
                      const v = row[c];
                      if(String(v || "").trim()) return true;
                  }
              }
              return false;
          };

          const teacherRows = teacherSheet ? XLSX.utils.sheet_to_json(teacherSheet, {header:1}) : [];
          const classRows = classSheet ? XLSX.utils.sheet_to_json(classSheet, {header:1}) : [];
          const hasTeacherData = teacherRows.length ? sheetHasData(teacherRows) : false;
          const hasClassData = classRows.length ? sheetHasData(classRows) : false;

          let useTeacherSheet = hasTeacherData;
          let useClassSheet = hasClassData;
          if(hasTeacherData && hasClassData){
              // Avoid double-booking conflicts when both sheets are filled.
              useClassSheet = false;
              alert("Both TeacherWise and ClassWise have data. Using TeacherWise only to avoid conflicts.");
          }

          // Parse TeacherWise (rows = teacher names)
          if(teacherSheet && useTeacherSheet){
              const rows = teacherRows;
              for(let r=1; r<rows.length; r++){
                  const row = rows[r];
                  const teacherName = String(row[0]||"").trim();
                  if(!teacherName) continue;
                  let teacherId = teacherByName.get(teacherName.toLowerCase());
                  if(!teacherId){
                      teacherId = await resolveTeacherIdByName(teacherName);
                  }
                  if(!teacherId){
                      conflicts.push(`Teacher not found: ${teacherName} (TeacherWise sheet)`);
                      continue;
                  }
                  for(let c=1; c<=periodCols.length; c++){
                      const cell = row[c];
                      const parsedList = parseTeacherWiseCell(cell);
                      if(!parsedList || !parsedList.length) continue;
                      const periodNum = periodMap[periodCols[c-1]];
                      if(!periodNum) continue;
                      parsedList.forEach(parsed => {
                          addEntry(teacherId, parsed.className, periodNum, parsed.startDay, parsed.endDay, parsed.subject);
                          addClassEntry(teacherId, parsed.className, periodNum, parsed.startDay, parsed.endDay, teacherName);
                      });
                  }
              }
          }

          // Parse ClassWise
          if(classSheet && useClassSheet){
              const rows = classRows;
              for(let r=1; r<rows.length; r++){
                  const row = rows[r];
                  const cls = String(row[0]||"").trim();
                  if(!cls) continue;
                  for(let c=1; c<=periodCols.length; c++){
                      const cell = row[c];
                      const parsedList = parseClassWiseCell(cell);
                      if(!parsedList || !parsedList.length) continue;
                      const periodNum = periodMap[periodCols[c-1]];
                      if(!periodNum) continue;
                      for(const parsed of parsedList){
                          let teacherId = teacherByName.get(parsed.teacher.toLowerCase());
                          if(!teacherId){
                              teacherId = await resolveTeacherIdByName(parsed.teacher);
                          }
                          if(!teacherId){
                              conflicts.push(`Teacher not found: ${parsed.teacher} (Class ${cls}, Period ${periodCols[c-1]})`);
                              continue;
                          }
                          addEntry(teacherId, cls, periodNum, parsed.startDay, parsed.endDay, parsed.subject);
                          addClassEntry(teacherId, cls, periodNum, parsed.startDay, parsed.endDay, parsed.teacher);
                      }
                  }
              }
          }

          if(conflicts.length){
              alert(`Upload blocked:\n${conflicts.slice(0,10).join("\n")}\n${conflicts.length>10?"...more":""}`);
              return;
          }

          // Build per-teacher timetable payload
          const teacherMap = new Map(); // teacherId -> array of period rows
          const addPeriodRow = (teacherId, periodNum, className, subject, startDay, endDay) => {
              if(!teacherMap.has(teacherId)) teacherMap.set(teacherId, []);
              const periodData = { period: periodNum, class: className, startDay, endDay };
              weekDays.forEach((day, idx)=>{
                  periodData[day] = (idx+1>=startDay && idx+1<=endDay) ? subject : "";
              });
              teacherMap.get(teacherId).push(periodData);
          };

          // Re-parse to construct payloads (uses the same parse logic but now writes rows)
          if(teacherSheet && useTeacherSheet){
              const rows = teacherRows;
              for(let r=1; r<rows.length; r++){
                  const row = rows[r];
                  const teacherName = String(row[0]||"").trim();
                  if(!teacherName) continue;
                  let teacherId = teacherByName.get(teacherName.toLowerCase());
                  if(!teacherId){
                      teacherId = await resolveTeacherIdByName(teacherName);
                  }
                  if(!teacherId) continue;
                  for(let c=1; c<=periodCols.length; c++){
                      const cell = row[c];
                      const parsedList = parseTeacherWiseCell(cell);
                      if(!parsedList || !parsedList.length) continue;
                      const periodNum = periodMap[periodCols[c-1]];
                      if(!periodNum) continue;
                      parsedList.forEach(parsed => {
                          addPeriodRow(teacherId, periodNum, parsed.className, parsed.subject, parsed.startDay, parsed.endDay);
                      });
                  }
              }
          }

          if(classSheet && useClassSheet){
              const rows = classRows;
              for(let r=1; r<rows.length; r++){
                  const row = rows[r];
                  const cls = String(row[0]||"").trim();
                  if(!cls) continue;
                  for(let c=1; c<=periodCols.length; c++){
                      const cell = row[c];
                      const parsedList = parseClassWiseCell(cell);
                      if(!parsedList || !parsedList.length) continue;
                      const periodNum = periodMap[periodCols[c-1]];
                      if(!periodNum) continue;
                      for(const parsed of parsedList){
                          let teacherId = teacherByName.get(parsed.teacher.toLowerCase());
                          if(!teacherId){
                              teacherId = await resolveTeacherIdByName(parsed.teacher);
                          }
                          if(!teacherId) continue;
                          addPeriodRow(teacherId, periodNum, cls, parsed.subject, parsed.startDay, parsed.endDay);
                      }
                  }
              }
          }

          for (const [teacherId, timetable] of teacherMap.entries()){
              saveRequests.push(fetch(`${EXAM_API}/timetable/set`,{
                  method:"POST",
                  headers:{"Content-Type":"application/json"},
                  body:JSON.stringify({session, teacher_id: teacherId, timetable})
              }).then(r=>r.json().catch(()=>({}))));
          }

          await Promise.all(saveRequests);
          alert("Timetable uploaded successfully.");
          const existing = await loadExistingTimetable();
          await generateRows(existing);
      };
      reader.readAsArrayBuffer(file);
  };
</script>
