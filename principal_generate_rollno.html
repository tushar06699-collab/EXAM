<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Roll No List - School ERP</title>
<link rel="stylesheet" href="admin_sidebar.css">

<style>
body { font-family:Poppins,sans-serif; background:#f2f4f7; margin:0; padding:0; display:flex; }
.sidebar {
    width:240px;
    background:#233465;
    color:white;
    height:100vh;
    position:fixed;
    left:0;
    top:0;
    padding-top:20px;
    box-sizing:border-box;
}
.sidebar h2 { text-align:center; font-size:22px; margin-bottom:25px; }
.sidebar a { display:block; padding:12px 20px; color:white; text-decoration:none; font-size:16px; }
.sidebar a:hover { background: rgba(255,255,255,0.25); }
.sidebar a.active { background: rgba(255,255,255,0.35); }

.container {
    margin-left:240px;
    flex:1;
    background:linear-gradient(180deg,#f8fbff 0%,#ffffff 100%);
    padding:24px;
    min-height:100vh;
    box-sizing:border-box;
}
.panel{
    background:#fff;
    padding:24px;
    border-radius:18px;
    box-shadow:0 16px 40px rgba(15,23,42,0.08);
    border:1px solid #e5e7eb;
}
header { text-align:center; font-size:2rem; margin-bottom:10px; font-weight:800; color:#1e293b; }
.info { text-align:center; margin-bottom:18px; font-size:1rem; color:#475569; font-weight:600; }
.toolbar{
    display:flex;
    flex-wrap:wrap;
    gap:14px;
    align-items:end;
    justify-content:center;
    margin-bottom:16px;
}
.toolbar .field{
    min-width:180px;
    display:flex;
    flex-direction:column;
    gap:6px;
}
.toolbar label{
    font-size:13px;
    font-weight:700;
    color:#334155;
}

table { width:100%; border-collapse:collapse; margin-top:10px; }
th, td { border:1px solid #ddd; padding:8px; text-align:center; }
th { background:#007bff; color:#fff; }
tr:nth-child(even){ background:#f9f9f9; }

button { margin-top:15px; padding:10px 15px; background:#4f46e5; color:#fff; border:none; border-radius:6px; cursor:pointer; }
button:hover { background:#3730a3; }

.preview-title{
    margin:26px 0 12px;
    font-size:18px;
    font-weight:800;
    color:#233465;
}
.roll-slips { display:none; }
.roll-slip {
    width:210mm;
    min-height:297mm;
    padding:10mm 8mm;
    box-sizing:border-box;
    page-break-after:always;
    break-after:page;
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:8mm 6mm;
    align-content:start;
    background:#fff;
}
.roll-slip .card {
    min-height:86mm;
    background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%);
    border:1.5px solid #0f172a;
    border-radius:14px;
    box-sizing:border-box;
    padding:14px 16px 12px;
    position:relative;
    overflow:hidden;
    box-shadow:0 10px 24px rgba(15,23,42,.08);
}
.roll-slip .card::before{
    content:"";
    position:absolute;
    inset:0 auto auto 0;
    width:100%;
    height:7px;
    background:linear-gradient(90deg,#233465,#4f46e5,#0ea5e9);
}
.card-top{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
    margin-top:4px;
}
.card-title{
    flex:1;
    min-width:0;
}
.roll-slip .card h4 {
    margin:0 0 4px 0;
    font-size:16px;
    line-height:1.2;
    font-weight:900;
    color:#0f172a;
    text-transform:uppercase;
}
.school-name{
    font-size:12px;
    font-weight:700;
    color:#475569;
    letter-spacing:.3px;
}
.roll-slip .card img.logo {
    width:52px;
    height:52px;
    object-fit:contain;
    flex-shrink:0;
}
.student-meta{
    margin-top:12px;
    display:grid;
    gap:8px;
}
.meta-row{
    display:flex;
    justify-content:space-between;
    gap:10px;
    border-bottom:1px dashed #cbd5e1;
    padding-bottom:5px;
}
.meta-label{
    font-size:12px;
    color:#64748b;
    font-weight:700;
    letter-spacing:.2px;
}
.meta-value{
    font-size:16px;
    color:#0f172a;
    font-weight:800;
    text-align:right;
}
.meta-value.roll-highlight{
    font-size:20px;
    color:#1d4ed8;
    font-weight:900;
}

@media print {
    html,body{
        margin:0 !important;
        padding:0 !important;
        background:#fff !important;
    }
    body { display:block; }
    .sidebar, .panel > :not(.roll-slips), .preview-title { display:none !important; }
    .container{
        margin:0 !important;
        padding:0 !important;
        background:#fff !important;
    }
    .panel{
        border:none !important;
        box-shadow:none !important;
        padding:0 !important;
        border-radius:0 !important;
    }
    .roll-slips{ display:block !important; }
    .roll-slip {
        page-break-after:always;
        box-shadow:none;
    }
    .roll-slip .card{
        box-shadow:none;
    }
}
</style>
</head>

<body>
<div class="sidebar">
    <h2>Principal Panel</h2>
    <a href="principal_dashboard.html">Dashboard</a>
  <a href="principal_student_exam_access.html">Student Exam Access</a>
    <a class="active" href="principal_generate_rollno.html">Generate Roll Numbers</a>
</div>

<div class="container">
<div class="panel">
<header>Exam Roll No List</header>

<div class="info">
    <span id="schoolName">School: P.S. Public School</span>
</div>

<div class="toolbar">
<div class="field">
<label>Session</label>
<select id="sessionSelect"></select>
</div>
<div class="field">
<label>Class</label>
<select id="classSelect"></select>
</div>
<div class="field">
<label>Exam</label>
<select id="examSelect"></select>
</div>
<div class="field">
<button onclick="generateList()">Generate List</button>
</div>
<div class="field">
<button onclick="printSlips()">Print Roll No Slips</button>
</div>
</div>

<div style="overflow-x:auto; margin-top:20px;">
<table>
<thead>
<tr>
<th>School</th>
<th>Class</th>
<th>Roll No</th>
<th>Student Name</th>
<th>Father Name</th>
<th>Mother Name</th>
<th>Exam Name</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<div class="preview-title">Roll No Slip Preview</div>
<div class="roll-slips" id="rollSlipsContainer"></div>
</div>
</div>

<script>
const STUDENT_API = "https://student-backend-117372286918.asia-south1.run.app/";
const EXAM_API = "https://exam-backend-117372286918.asia-south1.run.app/";

let STUDENTS = [];
let EXAMS = [];

function getClassCode(className){
    const text = String(className || "").trim();
    const match = text.match(/\d+/);
    if(match) return String(parseInt(match[0], 10));

    const normalized = text.toUpperCase();
    if(normalized === "NURSERY") return "0";
    if(normalized === "LKG") return "0";
    if(normalized === "UKG") return "0";
    return "";
}

function getSectionCode(section){
    const text = String(section || "").trim().toUpperCase();
    if(!text) return "0";
    if(/^\d+$/.test(text)) return String(parseInt(text, 10));
    const code = text.charCodeAt(0);
    if(code >= 65 && code <= 90) return String(code - 64);
    return "0";
}

function getExamRollNo(student){
    const className = String(student.class_name || "").trim().toUpperCase();
    const rawRoll = String(student.rollno || "").trim();
    const rollNum = parseInt(rawRoll, 10);
    const rollCode = Number.isFinite(rollNum) ? String(rollNum).padStart(2, "0") : rawRoll;

    if(["PP1","PP2","PP3"].includes(className)){
        return rollCode || "N/A";
    }

    const classCode = getClassCode(student.class_name);
    const sectionCode = getSectionCode(student.section);
    if(!classCode || !rollCode) return rawRoll || "N/A";
    return `${classCode}${sectionCode}${rollCode}`;
}

async function loadSessions() {
    const sessionSelect = document.getElementById("sessionSelect");
    sessionSelect.innerHTML = "<option>Loading sessions...</option>";

    try {
        const res = await fetch(`${EXAM_API}/session/list`);
        const data = await res.json();

        if(!data.success || !data.sessions || data.sessions.length === 0){
            sessionSelect.innerHTML = "<option>No sessions found</option>";
            return;
        }

        const sessions = data.sessions;
        let currentSession = localStorage.getItem("session") || sessions[sessions.length - 1];
        if(!sessions.includes(currentSession)){
            currentSession = sessions[sessions.length - 1];
        }
        localStorage.setItem("session", currentSession);

        sessionSelect.innerHTML = sessions.map(s=>`<option value="${s}">${s}</option>`).join("");
        sessionSelect.value = currentSession;

        // Save selection in localStorage
        sessionSelect.onchange = () => {
            currentSession = sessionSelect.value;
            localStorage.setItem("session", currentSession);
            loadStudents();
        };

        await loadStudents();

    } catch(e) {
        console.error("Error fetching sessions:", e);
        sessionSelect.innerHTML = "<option>Error loading sessions</option>";
    }
}

async function loadStudents() {
    const session = document.getElementById("sessionSelect").value;
    try {
        const res = await fetch(`${STUDENT_API}/students?session=${session}`);
        const data = await res.json();
        const studentsList = data.students || data || [];
        STUDENTS = studentsList;
        populateClasses();
        await loadExams();
    } catch(e) {
        console.error("Error fetching students:", e);
    }
}

function populateClasses() {
    const classes = [...new Set(STUDENTS.map(s => s.class_name).filter(Boolean))].sort();
    const classSelect = document.getElementById("classSelect");
    classSelect.innerHTML = `<option value="">Select</option>` + classes.map(c=>`<option value="${c}">${c}</option>`).join("");
    if(classes.length>0) classSelect.value = classes[0];
}

async function loadExams() {
    const session = document.getElementById("sessionSelect").value;
    try {
        const res = await fetch(`${EXAM_API}/exam/list-all`);
        const data = await res.json();
        const all = data.exams || [];
        EXAMS = session ? all.filter(e => String(e.session || "") === String(session)) : all;
        const examSelect = document.getElementById("examSelect");
        examSelect.innerHTML = `<option value="">Select</option>` + EXAMS.map(e=>`<option value="${e.exam_name}">${e.exam_name}</option>`).join("");
    } catch(e) {
        console.error("Error fetching exams:", e);
    }
}

function generateList() {
    const cls = document.getElementById("classSelect").value;
    const exam = document.getElementById("examSelect").value;
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    if (!cls || !exam) return alert("Select class and exam");

    const filtered = STUDENTS.filter(s => s.class_name === cls);
    if(filtered.length === 0) return alert("No students found for this class");

    filtered.forEach(s => {
        const tr = document.createElement("tr");
        const examRollNo = getExamRollNo(s);
        tr.innerHTML = `
            <td>P.S. Public School</td>
            <td>${s.class_name || ""}</td>
            <td>${examRollNo}</td>
            <td>${s.student_name || "N/A"}</td>
            <td>${s.father_name || "N/A"}</td>
            <td>${s.mother_name || "N/A"}</td>
            <td>${exam}</td>
        `;
        tbody.appendChild(tr);
    });

    generateSlips(filtered, exam);
}

function generateSlips(students, examName){
    const container = document.getElementById("rollSlipsContainer");
    container.innerHTML = "";
    const perSheet = 12;

    for(let i=0; i<students.length; i+=perSheet){
        const slice = students.slice(i,i+perSheet);
        const div = document.createElement("div");
        div.classList.add("roll-slip");

        slice.forEach(s=>{
            const examRollNo = getExamRollNo(s);
            const card = document.createElement("div");
            card.classList.add("card");
            card.innerHTML = `
                <div class="card-top">
                    <div class="card-title">
                        <h4>${s.student_name || "N/A"}</h4>
                        <div class="school-name">P.S. Public School</div>
                    </div>
                    <img class="logo" src="images/logo1.png" alt="Logo" />
                </div>
                <div class="student-meta">
                    <div class="meta-row">
                        <span class="meta-label">Class</span>
                        <span class="meta-value">${s.class_name || "N/A"}</span>
                    </div>
                    <div class="meta-row">
                        <span class="meta-label">Roll No</span>
                        <span class="meta-value roll-highlight">${examRollNo}</span>
                    </div>
                    <div class="meta-row">
                        <span class="meta-label">Father</span>
                        <span class="meta-value">${s.father_name || "N/A"}</span>
                    </div>
                    <div class="meta-row">
                        <span class="meta-label">Mother</span>
                        <span class="meta-value">${s.mother_name || "N/A"}</span>
                    </div>
                    <div class="meta-row">
                        <span class="meta-label">Exam</span>
                        <span class="meta-value">${examName}</span>
                    </div>
                </div>
            `;
            div.appendChild(card);
        });

        container.appendChild(div);
    }

    container.style.display = "block";
}

function printSlips(){
    const container = document.getElementById("rollSlipsContainer");
    if(!container.innerHTML.trim()){
        alert("Generate the roll no slips first.");
        return;
    }
    window.print();
}

// Reload students & exams when session changes
document.getElementById("sessionSelect").addEventListener("change", loadStudents);

// Load sessions on page load
loadSessions();
</script>
</body>
</html>
