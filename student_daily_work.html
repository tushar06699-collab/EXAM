<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Today Class Work</title>
<style>
body{
  margin:0;
  font-family:Poppins,system-ui,sans-serif;
  background:#f5f7fb;
}
header{
  background:#4e73df;
  color:#fff;
  padding:10px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.menu-btn{font-size:26px;cursor:pointer;}
.student-info{display:flex;align-items:center;gap:10px;}
.student-info img{width:38px;height:38px;border-radius:50%;border:2px solid #fff;object-fit:cover;}
.logout{background:rgba(255,255,255,.25);border:none;color:white;padding:6px 12px;border-radius:20px;}
.sidebar{
  position:fixed;top:0;left:-280px;width:260px;height:100%;
  background:#fff;padding:20px;box-shadow:2px 0 15px rgba(0,0,0,.2);
  transition:.3s;z-index:1001;
}
.sidebar a{display:block;padding:12px 0;color:#333;text-decoration:none;}
.sidebar a.active{font-weight:600;color:#4e73df;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;z-index:1000;}
.container{max-width:900px;margin:auto;padding:20px;}
.info{display:flex;justify-content:space-between;align-items:center;font-weight:600;margin-bottom:15px;gap:10px;flex-wrap:wrap;}
.date-input{padding:8px 10px;border-radius:8px;border:1px solid #cbd5e1;}
.card{
  background:#fff;border-radius:12px;box-shadow:0 3px 10px rgba(0,0,0,.08);
  padding:14px;margin-bottom:12px;border-left:4px solid #4e73df;
}
.card h4{margin:0 0 6px 0;color:#1f3b7a;}
.meta{color:#475569;font-size:13px;margin-bottom:6px;}
.empty{background:#fff;border-radius:12px;padding:18px;text-align:center;color:#64748b;}
</style>
<link rel="stylesheet" href="student_mobile.css"></head>
<body>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>
<div class="sidebar" id="sidebar">
  <h2>Student Menu</h2>
  <a onclick="openPage('student_portal.html')">Dashboard</a>
  <a onclick="openPage('student_results.html')">Results</a>
  <a onclick="openPage('student_timetable.html')">Timetable</a>
  <a onclick="openPage('student_exams.html')">Exams</a>
  <a onclick="openPage('student_hall_ticket.html')">Hall Ticket</a>
  <a onclick="openPage('student_attendance.html')">Attendance</a>
  <a onclick="openPage('student_daily_work.html')" class="active">Today Work</a>
  <a onclick="openPage('student_notices.html')">Notices</a>
  <a onclick="openPage('student_academic_calendar.html')">Academic Calendar</a>
  <hr>
</div>

<header>
  <div>
    <span class="menu-btn" onclick="openMenu()">☰</span>
    <span style="font-size:20px;margin-left:10px;">Today Class Work</span>
  </div>
  <div class="student-info">
    <img id="headerPhoto" src="images/default.png">
    <span id="headerName">Student</span>
    <button class="logout" onclick="logout()">Logout</button>
  </div>
</header>

<div class="container">
  <div class="info">
    <span id="classInfo"></span>
    <span id="sessionInfo">Loading session...</span>
    <input id="workDate" type="date" class="date-input">
  </div>

  <div id="workList"></div>
</div>

<script>
if(localStorage.getItem("role") !== "student"){ location.href="index.html"; }

const EXAM_API = "https://exam-backend-117372286918.asia-south1.run.app/";
const studentId = localStorage.getItem("student_id");
const studentClass = localStorage.getItem("class");
const studentSection = localStorage.getItem("section") || "";
let CURRENT_SESSION = "";

const workDate = document.getElementById("workDate");
const workList = document.getElementById("workList");

function openMenu(){ sidebar.style.left="0"; overlay.style.display="block"; }
function closeMenu(){ sidebar.style.left="-280px"; overlay.style.display="none"; }
function openPage(p){ location.href=p; }
function logout(){ localStorage.clear(); location.href="index.html"; }

async function loadStudentProfile(){
  try{
    const r = await fetch(`${EXAM_API}/portal/student/${studentId}`);
    const d = await r.json();
    if(d.success){
      headerName.innerText = d.student.name || "Student";
      headerPhoto.src = d.student.photo_url || "images/default.png";
      document.getElementById("classInfo").innerText = `Class: ${studentClass}${studentSection ? " - " + studentSection : ""}`;
    }
  }catch(e){}
}

async function loadSession(){
  const res = await fetch(`${EXAM_API}/session/list`);
  const data = await res.json();
  if(!data.sessions || !data.sessions.length){
    document.getElementById("sessionInfo").innerText = "Session not found";
    return;
  }
  CURRENT_SESSION = data.sessions[data.sessions.length - 1];
  document.getElementById("sessionInfo").innerText = "Session: " + CURRENT_SESSION;
  await loadWork();
}

async function loadWork(){
  const date = workDate.value;
  workList.innerHTML = "";
  if(!CURRENT_SESSION || !studentClass || !date){
    return;
  }
  try{
    const res = await fetch(`${EXAM_API}/student/daily-work/list?session=${encodeURIComponent(CURRENT_SESSION)}&class_name=${encodeURIComponent(studentClass)}&date=${encodeURIComponent(date)}`);
    const data = await res.json();
    const rows = (data.success && Array.isArray(data.rows)) ? data.rows : [];
    if(!rows.length){
      workList.innerHTML = `<div class="empty">No class work uploaded for this date.</div>`;
      return;
    }
    workList.innerHTML = rows.map(r => `
      <div class="card">
        <h4>${r.subject || "Subject"}</h4>
        <div class="meta">Teacher: ${r.teacher_name || "Teacher"}</div>
        <div>${r.work || ""}</div>
      </div>
    `).join("");
  }catch(e){
    workList.innerHTML = `<div class="empty">Unable to load class work.</div>`;
  }
}

window.addEventListener("DOMContentLoaded", () => {
  const t = new Date();
  workDate.value = t.toISOString().split("T")[0];
  workDate.max = workDate.value;
  loadStudentProfile();
  loadSession();
});

workDate.addEventListener("change", loadWork);
</script>

<script src="student_sidebar_shared.js"></script>
</body>
</html>
