<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Room Details Duty</title>
<style>
body{margin:0;font-family:Poppins,sans-serif;background:#eef2f9;color:#1f2937}.topbar{background:#233465;color:#fff;padding:16px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}.content{padding:20px}.hero,.panel{background:#fff;border:1px solid #dbe4f0;border-radius:18px;box-shadow:0 12px 24px rgba(15,23,42,.08);overflow:hidden}.hero{padding:24px;background:linear-gradient(135deg,#233465,#3f5fb1);color:#fff}.hero p{margin:8px 0 0;color:rgba(255,255,255,.86)}.session-pill{display:inline-flex;padding:8px 14px;background:rgba(255,255,255,.16);border-radius:999px;font-weight:700;font-size:14px}.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-top:18px}.summary-card{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);padding:16px;border-radius:16px}.summary-card .label{font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:rgba(255,255,255,.76)}.summary-card .value{font-size:24px;font-weight:700;margin-top:6px}.layout{display:grid;grid-template-columns:390px 1fr;gap:20px;margin-top:20px}.panel{padding:20px}.grid{display:grid;gap:14px}.grid input,.grid textarea,.grid select{width:100%;padding:11px;border:1px solid #cbd5e1;border-radius:10px;font:inherit;box-sizing:border-box}.grid textarea{min-height:120px;resize:vertical}.grid input[readonly]{background:#f8fafc;color:#475569;border-color:#dbe4f0}.editable-field input,.editable-field textarea,.editable-field select{border:2px solid #93c5fd;background:#eff6ff;box-shadow:0 0 0 3px rgba(59,130,246,.12)}.editable-field label{font-weight:700;color:#1d4ed8}.btn-row{display:flex;gap:10px;flex-wrap:wrap}.btn-row button{border:none;padding:11px 16px;border-radius:10px;cursor:pointer;font:inherit}.primary-btn{background:#233465;color:#fff}.secondary-btn{background:#e2e8f0;color:#0f172a}.danger-btn{background:#fee2e2;color:#b91c1c;border:none;padding:10px 14px;border-radius:10px;cursor:pointer;font:inherit}.status{font-size:13px;min-height:18px}.helper{color:#64748b;font-size:14px;line-height:1.5}.table-wrap{overflow:auto;-webkit-overflow-scrolling:touch}.table-wrap table{width:100%;min-width:760px;border-collapse:collapse}.table-wrap th,.table-wrap td{padding:12px;border-bottom:1px solid #e2e8f0;text-align:left;vertical-align:top}.action-cell{display:flex;gap:8px;flex-wrap:wrap}@media (max-width:960px){.content{padding:14px}.layout{grid-template-columns:1fr}.panel,.hero{padding:16px}}@media (max-width:640px){.content{padding:10px}.hero,.panel{padding:14px;border-radius:14px}.summary{grid-template-columns:1fr}.btn-row button,.action-cell button{width:100%}.session-pill{font-size:12px;padding:7px 11px}}
</style>
</head>
<body data-duty-mode="teacher-room-fill" data-activity-key="room_details" data-activity-title="Room Details Fill">
<div class="topbar">
  <span class="menu-btn" onclick="toggleMenu()"></span>
  <h2 style="margin:0;">Teacher Duty Fill Page</h2>
</div>
<div class="sidebar" id="sidebar"></div>
<div class="content">
  <section class="hero">
    <div class="session-pill">Session: <span id="teacherFillSession" style="margin-left:6px;"></span></div>
    <h1 id="teacherFillTitle" style="margin:16px 0 6px;"></h1>
    <p id="teacherFillSubtitle"></p>
    <div class="summary">
      <article class="summary-card"><div class="label">Teacher</div><div class="value" id="teacherFillTeacherName" style="font-size:20px;"></div></article>
      <article class="summary-card"><div class="label">Teacher ID</div><div class="value" id="teacherFillTeacherId" style="font-size:20px;"></div></article>
      <article class="summary-card"><div class="label">Assigned Duties</div><div class="value" id="teacherFillCount">0</div></article>
    </div>
  </section>
  <section class="layout">
    <div class="panel">
      <form id="teacherRoomForm" class="grid">
        <input type="hidden" id="teacherDutyId">
        <input type="hidden" id="teacherDutyTeacherId">
        <div><label for="teacherDutyTitle">Assigned Duty</label><input id="teacherDutyTitle" type="text" readonly></div>
        <div><label for="teacherDutyExam">Exam</label><input id="teacherDutyExam" type="text" readonly></div>
        <div><label for="teacherDutyDate">Duty Date</label><input id="teacherDutyDate" type="text" readonly></div>
        <div><label for="teacherDutyDueDate">Submission Date</label><input id="teacherDutyDueDate" type="text" readonly></div>
        <div class="editable-field"><label for="teacherRoomNo">Room No</label><input id="teacherRoomNo" type="text" placeholder="e.g. A101"></div>
        <div class="editable-field"><label for="teacherRoomRows">Benches Column</label><input id="teacherRoomRows" type="number" min="1" placeholder="e.g. 3"></div>
        <div id="teacherBenchRowsWrap"></div>
        <div class="editable-field"><label for="teacherSeatsPerBench">Seats Per Bench</label><input id="teacherSeatsPerBench" type="number" min="1" value="2"></div>
        <div class="helper" id="teacherDutyCurrentInfo"></div>
        <div class="btn-row"><button type="submit" class="primary-btn">Save Room</button><button type="button" id="resetTeacherDutyBtn" class="secondary-btn">Reload Assigned Duty</button></div>
        <div id="teacherDutyFormStatus" class="status"></div>
      </form>
    </div>
    <div class="panel table-wrap">
      <h2 style="margin-top:0;">Saved Rooms</h2>
      <p class="helper">Save room details in the same format as the admin room page. This updates the room data and marks the duty progress.</p>
      <table>
        <thead><tr><th>Room No</th><th>Columns</th><th>Benches/Row</th><th>Seats/Bench</th><th>Capacity</th><th>Action</th></tr></thead>
        <tbody id="teacherRoomBody"></tbody>
      </table>
    </div>
  </section>
</div>
<script src="teacher_duties_shared.js"></script>
<script src="teacher_sidebar_shared.js"></script>
</body>
</html>
