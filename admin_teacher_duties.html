<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Teacher Duties</title>
<link rel="stylesheet" href="admin_sidebar.css">
<style>
body{margin:0;font-family:Poppins,sans-serif;background:#eef2f9;color:#1f2937}
.sidebar{width:240px;height:100vh;position:fixed;left:0;top:0}
.main{margin-left:240px;padding:28px}
.hero{background:linear-gradient(135deg,#233465,#3f5fb1);color:#fff;padding:28px;border-radius:18px;box-shadow:0 18px 36px rgba(35,52,101,.22)}
.hero p{margin:8px 0 0;color:rgba(255,255,255,.86)}
.hero-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:18px;align-items:end}
.session-chip{display:inline-flex;padding:8px 14px;background:rgba(255,255,255,.16);border-radius:999px;font-size:14px;font-weight:600}
select,button{font:inherit}
.selector{background:#fff;border-radius:16px;padding:20px;box-shadow:0 12px 24px rgba(15,23,42,.08)}
.selector select{width:100%;padding:12px;border:1px solid #cbd5e1;border-radius:10px;margin-top:10px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px;margin-top:24px}
.duty-card{background:#fff;border-radius:18px;padding:22px;box-shadow:0 12px 24px rgba(15,23,42,.08);border:1px solid #dbe4f0}
.duty-card-tag{display:inline-flex;padding:6px 10px;background:#dbeafe;color:#1d4ed8;border-radius:999px;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.duty-card h3{margin:14px 0 10px;font-size:20px}
.duty-card p{margin:0 0 18px;color:#52607a;line-height:1.5}
.duty-card button{border:none;background:#233465;color:#fff;padding:11px 16px;border-radius:10px;cursor:pointer}
@media (max-width:900px){
  .main{margin-left:0;padding:16px}
  .sidebar{position:static;width:100%;height:auto}
  .hero-grid{grid-template-columns:1fr}
}
</style>
</head>
<body data-duty-mode="admin-hub">
<div class="sidebar">
  <h2>EXAM ERP</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="teachers.html">Teacher Management</a>
  <a href="rooms.html">Room Management</a>
  <a href="seat_plan.html">Seat Plan</a>
  <a href="admin_teacher_duties.html" class="active">Teacher Duties</a>
</div>

<main class="main">
  <section class="hero">
    <div class="hero-grid">
      <div>
        <div class="session-chip">Current Session: <span id="currentSessionLabel" style="margin-left:6px;"></span></div>
        <h1 style="margin:16px 0 0;">Admin Duty Assignment</h1>
        <p>Select an activity page and assign exam work to teachers. Each activity opens on a separate page.</p>
      </div>
      <div class="selector">
        <label for="activityPageSelect" style="font-weight:700;color:#0f172a;">Open Activity Page</label>
        <select id="activityPageSelect"></select>
      </div>
    </div>
  </section>

  <section class="cards" id="activityCards"></section>
</main>

<script src="teacher_duties_shared.js"></script>
</body>
</html>
