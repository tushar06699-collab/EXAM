<body>

<div class="main">

    <div class="topbar">
        <div class="topbar-left">
    <h1>Dashboard</h1>
    <label>Session:</label>
    <select id="sessionSelect"></select>
    <!-- New Manage Sessions button -->
    <button id="manageSessionBtn" style="margin-left:10px;">Manage Sessions</button>
</div>

        <button id="logoutBtn">Logout</button>
    </div>

    <!-- Cards -->
    <div class="cards">

        <div class="card" onclick="location.href='exam_list.html'">
            <h3>Total Exams</h3>
            <p id="examCount">0</p>
        </div>

        <div class="card" onclick="location.href='class_list.html'">
            <h3>Total Classes</h3>
            <p id="classCount">0</p>
        </div>

        <div class="card" onclick="location.href='student_list.html'">
            <h3>Total Students</h3>
            <p id="studentCount">0</p>
        </div>

    </div>

    <div class="progress-panel">
        <div class="progress-head">
            <h2>Setup Progress</h2>
            <button id="refreshProgressBtn" type="button">Refresh Status</button>
        </div>
        <div class="progress-grid" id="progressGrid"></div>
    </div>

</div>

<script>
const STUDENT_API = "https://student-backend-117372286918.asia-south1.run.app";
const EXAM_API = "https://exam-backend-117372286918.asia-south1.run.app"; 
const FEE_API = "https://fee-backend-ntas.onrender.com";

document.getElementById("manageSessionBtn").onclick = () => {
    window.location.href = "session_manage.html"; // change if your page name is different
};

let currentSession = localStorage.getItem("session") || "";

/* LOAD SESSIONS */
/* LOAD SESSIONS */
async function loadSessions() {
    try {
        const res = await fetch(`${EXAM_API}/session/list`);
        const data = await res.json();

        const sel = document.getElementById("sessionSelect");
        sel.innerHTML = "";

        // If no sessions exist
        if (!data.sessions || data.sessions.length === 0) {

    // FORCE_LATEST_SESSION
    if (Array.isArray(data.sessions) && data.sessions.length) {
        const latest = data.sessions[data.sessions.length - 1];
        if (latest) {
            localStorage.setItem('session', latest);
        }
    }
            sel.innerHTML = `<option value="">No Sessions</option>`;
            return;
        }

        data.sessions.forEach(s => {
            let op = document.createElement("option");
            op.value = s;
            op.textContent = s;
            sel.appendChild(op);
        });

        if (!data.sessions.includes(currentSession)) {
            currentSession = data.sessions[data.sessions.length - 1];
        }

        sel.value = currentSession;
        localStorage.setItem("session", currentSession);

        sel.onchange = () => {
            currentSession = sel.value;
            localStorage.setItem("session", currentSession);
            loadStats();
        };

        loadStats();
    } catch(e) {
        console.error("Session load error", e);
        alert("Failed to load sessions");
    }
}


/* LOAD ALL STATS */
function loadStats() {
    loadStudentCount();
    loadClassCount();
    loadExamCount();
    loadSetupProgress();
}

const PROGRESS_ITEMS = [
    { key: "subject_add", label: "Subject Add", page: "subject_add.html" },
    { key: "holidays", label: "Holidays", page: "admin_holiday.html" },
    { key: "incharge", label: "Incharge", page: "incharge.html" },
    { key: "subject_marks_add", label: "Subject Marks Add", page: "exam_subject_marks_config.html" },
    { key: "teacher_management", label: "Teacher Management", page: "teachers.html" },
    { key: "add_timetable", label: "Add Timetable", page: "Timetable.html" },
    { key: "exam_create", label: "Exam Create", page: "exam_create.html" },
    { key: "exam_datesheet", label: "Exam Datesheet", page: "datesheet.html" },
    { key: "student_exam_access", label: "Student Exam Access", page: "student_exam_access.html" },
    { key: "upload_internal_marks", label: "Upload Internal Marks", page: "internal_marks_add.html" },
    { key: "upload_external_marks", label: "Upload External Marks", page: "uploaded_marks.html" },
    { key: "publish_result", label: "Publish Result", page: "result_publish.html" },
    { key: "daily_export", label: "Daily Export", page: "admin_export.html" }
];

function renderProgressSkeleton() {
    const grid = document.getElementById("progressGrid");
    grid.innerHTML = PROGRESS_ITEMS.map(item => `
        <div class="progress-item">
            <b><a class="progress-link" href="${item.page}">${item.label}</a></b>
            <span class="badge checking" id="status_${item.key}">Checking...</span>
            <div class="progress-detail" id="detail_${item.key}">Loading details...</div>
        </div>
    `).join("");
}

function setProgressStatus(key, done) {
    const el = document.getElementById(`status_${key}`);
    if (!el) return;
    el.className = `badge ${done ? "complete" : "incomplete"}`;
    el.textContent = done ? "Complete" : "Incomplete";
}

function setProgressDetail(key, text) {
    const el = document.getElementById(`detail_${key}`);
    if (!el) return;
    el.textContent = text || "-";
}

async function fetchJsonSafe(url) {
    try {
        const res = await fetch(url);
        if (!res.ok) return null;
        return await res.json();
    } catch (_e) {
        return null;
    }
}

async function getClassesAndExamsForSession() {
    const studentsData = await fetchJsonSafe(`${STUDENT_API}/students`);
    const examsData = await fetchJsonSafe(`${EXAM_API}/exam/list-all`);

    const students = Array.isArray(studentsData) ? studentsData : [];
    // Keep class base same as "Total Classes" card (all classes), so progress counts match dashboard.
    const classes = [...new Set(
        students
            .map(s => (s.class_name || s.class || "").trim())
            .filter(Boolean)
    )];

    const exams = (examsData && examsData.success && Array.isArray(examsData.exams))
        ? examsData.exams.filter(e => (e.session || "").trim() === (currentSession || "").trim())
        : [];

    return { classes, exams };
}

async function anyClassMatch(classes, fn) {
    for (const cls of classes) {
        if (await fn(cls)) return true;
    }
    return false;
}

async function anyClassExamMatch(classes, exams, fn) {
    for (const cls of classes) {
        for (const ex of exams) {
            if (await fn(cls, ex)) return true;
        }
    }
    return false;
}

async function loadSetupProgress() {
    renderProgressSkeleton();

    const holidaysData = await fetchJsonSafe(`${EXAM_API}/holiday/list?session=${encodeURIComponent(currentSession)}`);
    const teachersData = await fetchJsonSafe(`${EXAM_API}/teacher/list?session=${encodeURIComponent(currentSession)}`);
    const { classes, exams } = await getClassesAndExamsForSession();

    const examCreateDone = exams.length > 0;
    const holidaysDone = !!(holidaysData && holidaysData.success && Array.isArray(holidaysData.holidays) && holidaysData.holidays.length);
    const teacherMgmtDone = !!(teachersData && teachersData.success && Array.isArray(teachersData.teachers) && teachersData.teachers.length);

    let subjectAddDone = false;
    let classesWithSubjects = 0;
    if (classes.length) {
        for (const cls of classes) {
            const d = await fetchJsonSafe(`${EXAM_API}/exam/subjects/get?session=${encodeURIComponent(currentSession)}&class_name=${encodeURIComponent(cls)}`);
            if (d && d.success && Array.isArray(d.subjects) && d.subjects.length) classesWithSubjects += 1;
        }
        subjectAddDone = classesWithSubjects === classes.length;
    }

    let subjectMarksDone = false;
    let subjectMarksDoneCombos = 0;
    const totalCombos = classes.length * exams.length;
    if (classes.length && exams.length) {
        for (const cls of classes) for (const ex of exams) {
            const d = await fetchJsonSafe(
                `${EXAM_API}/exam/subject-config/get?session=${encodeURIComponent(currentSession)}&class_name=${encodeURIComponent(cls)}&exam_name=${encodeURIComponent(ex.exam_name || "")}`
            );
            if (d && d.success && Array.isArray(d.rows) && d.rows.length) subjectMarksDoneCombos += 1;
        }
        subjectMarksDone = totalCombos > 0 && subjectMarksDoneCombos === totalCombos;
    }

    let timetableDone = false;
    let classesWithTimetable = 0;
    if (classes.length) {
        for (const cls of classes) {
            const d = await fetchJsonSafe(`${EXAM_API}/timetable/classwise?session=${encodeURIComponent(currentSession)}&class_name=${encodeURIComponent(cls)}`);
            if (d && d.success && Array.isArray(d.timetable) && d.timetable.length) classesWithTimetable += 1;
        }
        timetableDone = classesWithTimetable === classes.length;
    }

    let datesheetDone = false;
    let datesheetDoneCombos = 0;
    if (classes.length && exams.length) {
        for (const cls of classes) for (const ex of exams) {
            const d = await fetchJsonSafe(
                `${EXAM_API}/exam/get-datesheet?session=${encodeURIComponent(currentSession)}&class_name=${encodeURIComponent(cls)}&exam_name=${encodeURIComponent(ex.exam_name || "")}`
            );
            if (d && d.success && Array.isArray(d.datesheet) && d.datesheet.some(r => (r.date || "").trim())) datesheetDoneCombos += 1;
        }
        datesheetDone = totalCombos > 0 && datesheetDoneCombos === totalCombos;
    }

    let studentAccessDone = false;
    let classesWithAccessConfig = 0;
    let studentsEnabledCount = 0;
    if (classes.length) {
        for (const cls of classes) {
            const d = await fetchJsonSafe(`${EXAM_API}/student-access/list?session=${encodeURIComponent(currentSession)}&class_name=${encodeURIComponent(cls)}`);
            if (!(d && d.success && Array.isArray(d.students) && d.students.length)) continue;
            const enabledInClass = d.students.filter(s => !!(s.eligible || s.release_rollno || s.release_result)).length;
            if (enabledInClass > 0) classesWithAccessConfig += 1;
            studentsEnabledCount += enabledInClass;
        }
        studentAccessDone = classesWithAccessConfig === classes.length;
    }

    let internalDone = false;
    let internalDoneCombos = 0;
    if (classes.length && exams.length) {
        for (const cls of classes) for (const ex of exams) {
            const d = await fetchJsonSafe(
                `${EXAM_API}/internal-marks/subjects?session=${encodeURIComponent(currentSession)}&class_name=${encodeURIComponent(cls)}&exam_name=${encodeURIComponent(ex.exam_name || "")}`
            );
            if (d && d.success && Array.isArray(d.subjects) && d.subjects.length) internalDoneCombos += 1;
        }
        internalDone = totalCombos > 0 && internalDoneCombos === totalCombos;
    }

    let externalDone = false;
    let externalDoneCombos = 0;
    if (classes.length && exams.length) {
        for (const cls of classes) for (const ex of exams) {
            const d = await fetchJsonSafe(
                `${EXAM_API}/exam/get-marks?session=${encodeURIComponent(currentSession)}&class_name=${encodeURIComponent(cls)}&exam_name=${encodeURIComponent(ex.exam_name || "")}`
            );
            if (d && d.success && Array.isArray(d.marks) && d.marks.length) externalDoneCombos += 1;
        }
        externalDone = totalCombos > 0 && externalDoneCombos === totalCombos;
    }

    let publishDone = false;
    let publishedCombos = 0;

    function normalizeInchargeKey(raw){
        return String(raw || "")
            .toLowerCase()
            .replace(/class\s*/g, "")
            .replace(/\s+/g, "")
            .trim();
    }
    let inchargeDone = false;
    let classesWithIncharge = 0;
    if (classes.length) {
        const incData = await fetchJsonSafe(`${EXAM_API}/incharge/get?session=${encodeURIComponent(currentSession)}`);
        const inchargeMap = (incData && incData.incharge) || {};
        const keys = new Set(Object.keys(inchargeMap || {}).map(normalizeInchargeKey));
        for (const cls of classes) {
            const norm = normalizeInchargeKey(cls);
            if (keys.has(norm) && String(inchargeMap[Object.keys(inchargeMap).find(k => normalizeInchargeKey(k) === norm)] || "").trim()) {
                classesWithIncharge += 1;
            }
        }
        inchargeDone = classesWithIncharge === classes.length;
    }

    const todayKey = `daily_export_${new Date().toISOString().slice(0,10)}`;
    const dailyExportDone = localStorage.getItem(todayKey) === "true";
    if (classes.length && exams.length) {
        for (const cls of classes) for (const ex of exams) {
            const d = await fetchJsonSafe(
                `${EXAM_API}/result/status?session=${encodeURIComponent(currentSession)}&class_name=${encodeURIComponent(cls)}&exam_name=${encodeURIComponent(ex.exam_name || "")}`
            );
            if (d && d.success && d.published === true) publishedCombos += 1;
        }
        publishDone = totalCombos > 0 && publishedCombos === totalCombos;
    }

    setProgressStatus("subject_add", subjectAddDone);
    setProgressStatus("holidays", holidaysDone);
    setProgressStatus("incharge", inchargeDone);
    setProgressStatus("subject_marks_add", subjectMarksDone);
    setProgressStatus("teacher_management", teacherMgmtDone);
    setProgressStatus("add_timetable", timetableDone);
    setProgressStatus("exam_create", examCreateDone);
    setProgressStatus("exam_datesheet", datesheetDone);
    setProgressStatus("student_exam_access", studentAccessDone);
    setProgressStatus("upload_internal_marks", internalDone);
    setProgressStatus("upload_external_marks", externalDone);
    setProgressStatus("publish_result", publishDone);
    setProgressStatus("daily_export", dailyExportDone);

    const classesLeftSubjects = Math.max(0, classes.length - classesWithSubjects);
    const classesLeftTimetable = Math.max(0, classes.length - classesWithTimetable);
    const classesLeftAccess = Math.max(0, classes.length - classesWithAccessConfig);
    const combosLeftSubjectMarks = Math.max(0, totalCombos - subjectMarksDoneCombos);
    const combosLeftDatesheet = Math.max(0, totalCombos - datesheetDoneCombos);
    const combosLeftInternal = Math.max(0, totalCombos - internalDoneCombos);
    const combosLeftExternal = Math.max(0, totalCombos - externalDoneCombos);
    const combosLeftPublish = Math.max(0, totalCombos - publishedCombos);

    setProgressDetail("subject_add", `${classesWithSubjects}/${classes.length} classes configured${classesLeftSubjects ? `, ${classesLeftSubjects} class left` : ""}`);
    const holidayCount = (holidaysData && Array.isArray(holidaysData.holidays)) ? holidaysData.holidays.length : 0;
    const teacherCount = (teachersData && Array.isArray(teachersData.teachers)) ? teachersData.teachers.length : 0;

    setProgressDetail("holidays", `${holidayCount} holidays filled`);
    setProgressDetail("incharge", `${classesWithIncharge}/${classes.length} classes assigned`);
    setProgressDetail("subject_marks_add", `${subjectMarksDoneCombos}/${totalCombos} class-exam configs${combosLeftSubjectMarks ? `, ${combosLeftSubjectMarks} left` : ""}`);
    setProgressDetail("teacher_management", `${teacherCount} teachers added`);
    setProgressDetail("add_timetable", `${classesWithTimetable}/${classes.length} classes have timetable${classesLeftTimetable ? `, ${classesLeftTimetable} class left` : ""}`);
    setProgressDetail("exam_create", `${exams.length} exams created in ${currentSession || "session"}`);
    setProgressDetail("exam_datesheet", `${datesheetDoneCombos}/${totalCombos} class-exam datesheets${combosLeftDatesheet ? `, ${combosLeftDatesheet} left` : ""}`);
    setProgressDetail("student_exam_access", `${studentsEnabledCount} students enabled; ${classesWithAccessConfig}/${classes.length} classes configured${classesLeftAccess ? `, ${classesLeftAccess} class left` : ""}`);
    setProgressDetail("upload_internal_marks", `${internalDoneCombos}/${totalCombos} class-exam uploads${combosLeftInternal ? `, ${combosLeftInternal} left` : ""}`);
    setProgressDetail("upload_external_marks", `${externalDoneCombos}/${totalCombos} class-exam uploads${combosLeftExternal ? `, ${combosLeftExternal} left` : ""}`);
    setProgressDetail("publish_result", `${publishedCombos}/${totalCombos} class-exam results published${combosLeftPublish ? `, ${combosLeftPublish} left` : ""}`);
    setProgressDetail("daily_export", dailyExportDone ? "Export completed today" : "Export not done today");
}


/* STUDENT COUNT */
async function loadStudentCount() {
    try {
        const res = await fetch(`${STUDENT_API}/students`);
        const students = await res.json();

        document.getElementById("studentCount").textContent = students.length;

    } catch(e) {
        console.error(e);
        document.getElementById("studentCount").textContent = 0;
    }
}


/* CLASS COUNT (UNIQUE CLASSES) */
async function loadClassCount() {
    try {
        const res = await fetch(`${STUDENT_API}/students`);
        const students = await res.json();

        const unique = new Set();

        students.forEach(s => {
            let cls = s.class_name || s.class;
            if (cls) unique.add(cls.trim());
        });

        document.getElementById("classCount").textContent = unique.size;

    } catch(e) {
        console.error(e);
        document.getElementById("classCount").textContent = 0;
    }
}


/* EXAM COUNT */
async function loadExamCount() {
    try {
        const res = await fetch(`${EXAM_API}/exam/list-all`);
        const data = await res.json();

        if (!data.success) {
            document.getElementById("examCount").textContent = 0;
            return;
        }

        const exams = data.exams.filter(e => e.session === currentSession);

        document.getElementById("examCount").textContent = exams.length;

    } catch (e) {
        console.error(e);
        document.getElementById("examCount").textContent = 0;
    }
}


/* LOGOUT BUTTON */
document.getElementById("logoutBtn").onclick = () => {
    localStorage.removeItem("session");
    window.location.href = "index.html";
};

document.getElementById("refreshProgressBtn").onclick = () => {
    loadSetupProgress();
};


window.onload = loadSessions;
</script>
