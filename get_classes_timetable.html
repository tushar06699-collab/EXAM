<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Class-wise Timetable - School ERP</title>`n<link rel="stylesheet" href="admin_sidebar.css">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { margin:0; font-family: Poppins, sans-serif; background:#f2f4f8; }

.sidebar {
    width:220px; height:100vh; background:#324a87; color:#fff;
    position:fixed; left:0; top:0; padding:20px;
}
.sidebar a { display:block; padding:12px; margin:5px 0; color:#fff; text-decoration:none; border-radius:8px; }
.sidebar a:hover, .sidebar a.active { background:#233465; }

.main { margin-left:240px; padding:30px; }
h1 { text-align:center; margin-bottom:20px; }

.top-bar { display:flex; justify-content:center; gap:20px; margin-bottom:20px; }
label { font-weight:600; }
select { padding:5px; border-radius:5px; }
button{
    padding:6px 12px;
    border:none;
    border-radius:6px;
    background:#1e8f3d;
    color:#fff;
    cursor:pointer;
}

table {
    width:100%; border-collapse: collapse; background:white;
    border-radius:10px; overflow:hidden; box-shadow:0 3px 10px rgba(0,0,0,0.1);
    text-align:center;
}
th, td { padding:10px; border:1px solid #ddd; }
th { background:#324a87; color:white; }
tr:nth-child(even){ background:#f2f4f7; }
.lunch-cell { background:#f0f0f0; font-weight:bold; }

.timetable-cell { display:flex; flex-direction:column; gap:2px; font-size:13px; }
.timetable-cell span { display:block; }
.status-note{margin:8px 0 14px;text-align:center;font-size:13px;color:#233465;font-weight:600}
</style>
</head>

<body>

<div class="sidebar">
    <h2>EXAM ERP</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="subject_add.html">Subjects Management</a>
    <a href="exam_subject_marks_config.html">Subject Marks Config</a>
    <a href="rooms.html">Room Management</a>
    <a href="teachers.html">Teacher Management</a>
    <a href="Timetable.html">Add Timetable</a>
    <a href="get_classes_timetable.html" class="active">View Class Timetable</a>
    <a href="get_teacher_timetable.html">View Teacher Timetable</a>    
</div>

<div class="main">
    <h1>Class-wise Timetable</h1>

    <div class="top-bar">
        <div>
            <label>Session:</label>
            <select id="sessionSelect"></select>
        </div>
        <div>
            <label>&nbsp;</label>
            <button onclick="autoAssignIncharge()">Auto Assign Incharge (Period 1)</button>
        </div>
        <div>
            <label>&nbsp;</label>
            <button onclick="downloadPDF()">Download PDF</button>
        </div>
    </div>
    <div id="statusNote" class="status-note"></div>

    <table>
        <thead>
            <tr id="theadRow"><th>Class</th></tr>
        </thead>
        <tbody id="timetableBody"></tbody>
    </table>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const EXAM_API = "https://exam-backend-117372286918.asia-south1.run.app/";
const SCHOOL_NAME = localStorage.getItem("schoolName") || "P.S. Public School";

const periods = ["Period 1","Period 2","Period 3","Period 4","Lunch","Period 5","Period 6","Period 7","Period 8"];

const periodMap = {
    "Period 1": 1,
    "Period 2": 2,
    "Period 3": 3,
    "Period 4": 4,
    "Period 5": 5,
    "Period 6": 6,
    "Period 7": 7,
    "Period 8": 8
};

const weekDays = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

const sessionSelect = document.getElementById("sessionSelect");
const theadRow = document.getElementById("theadRow");
const timetableBody = document.getElementById("timetableBody");
const statusNote = document.getElementById("statusNote");

let classes = [];
let timetableData = {};

function normalizeClassName(raw){
    return String(raw || "").trim().replace(/\s+/g, " ");
}

function normalizeSessionList(raw){
    const arr = Array.isArray(raw) ? raw : [];
    return arr.map(s => {
        if (typeof s === "string") return s;
        if (s && typeof s === "object") return String(s.name || s.session || "").trim();
        return "";
    }).filter(Boolean);
}

function pickTeacherFromPeriod1Rows(rows){
    if (!Array.isArray(rows) || !rows.length) return "";
    for (const row of rows) {
        for (const d of weekDays) {
            const v = String(row?.[d] || "").trim();
            if (!v || !v.includes(" - ")) continue;
            const teacher = String(v.split(" - ")[0] || "").trim();
            if (teacher) return teacher;
        }
    }
    return "";
}

// LOAD SESSIONS
async function loadSessions() {
    const res = await fetch(`${EXAM_API}/session/list`);
    const data = await res.json();
    const sessions = normalizeSessionList(data.sessions);

    // FORCE_LATEST_SESSION
    if (Array.isArray(data.sessions) && data.sessions.length) {
        const latest = data.sessions[data.sessions.length - 1];
        if (latest) {
            localStorage.setItem('session', latest);
        }
    }
    sessionSelect.innerHTML = sessions.map(s=>`<option value="${s}">${s}</option>`).join("");
    if (sessions.length) {
        sessionSelect.value = sessions[sessions.length - 1];
    }
}

// LOAD CLASSES
const STUDENT_API = localStorage.getItem("studentApiBaseUrl") || "https://student-backend-117372286918.asia-south1.run.app/";

// LOAD CLASSES
function normalizeSessionName(v){
    return String(v || "").trim().replace(/[-/ ]/g, "_");
}

async function loadClasses() {
    try {
        const session = sessionSelect.value;
        const res = await fetch(`${STUDENT_API}/students?session=${encodeURIComponent(session)}&strict=1`);
        const data = await res.json();

        // Support both array directly or object with 'students' property
        const studentListRaw = Array.isArray(data) ? data : (data.students || []);
        const targetSession = normalizeSessionName(session);
        const studentList = studentListRaw.filter(s => normalizeSessionName(s.session) === targetSession);

        // Extract unique class names
        classes = [...new Set(studentList.map(s => s.class_name).filter(Boolean))];

        // Custom sort: numeric first, then stream
        classes.sort((a,b)=>{
            const regex = /^(\d+)(?:\s*(.*))?$/;
            const ma = a.match(regex), mb = b.match(regex);
            if(!ma || !mb) return 0;
            const numA = parseInt(ma[1]), numB = parseInt(mb[1]);
            if(numA !== numB) return numA - numB;
            const streamA = ma[2]||"", streamB = mb[2]||"";
            return streamA.localeCompare(streamB);
        });

        console.log("Classes loaded:", classes);

    } catch(e) {
        console.error("Error loading classes:", e);
        classes = [];
    }
}

// LOAD TIMETABLE
async function loadTimetable() {
    const session = sessionSelect.value;

    timetableData = {};
    const jobs = classes.map(async (cls)=>{
        try{
            const res = await fetch(`${EXAM_API}/timetable/classwise?session=${encodeURIComponent(session)}&class_name=${encodeURIComponent(cls)}`);
            const data = await res.json();
            timetableData[cls] = data.timetable || [];
        } catch {
            timetableData[cls] = [];
        }
    });
    await Promise.all(jobs);
}

async function autoAssignIncharge(){
    const session = sessionSelect.value;
    if (!session) {
        alert("Select session first");
        return;
    }
    if (!classes.length) {
        alert("No classes loaded");
        return;
    }

    statusNote.textContent = "Assigning incharge from Period 1...";

    let success = 0;
    let skipped = 0;
    let failed = 0;

    for (const cls of classes) {
        const rows = Array.isArray(timetableData[cls]) ? timetableData[cls] : [];
        const period1Rows = rows.filter(item => Number(item.period) === 1);
        const teacher = pickTeacherFromPeriod1Rows(period1Rows);
        if (!teacher) {
            skipped += 1;
            continue;
        }

        // Save against normalized class key so class_list page can show it reliably.
        const classKey = normalizeClassName(cls);
        try{
            const res = await fetch(`${EXAM_API}/incharge/set`, {
                method: "POST",
                headers: { "Content-Type":"application/json" },
                body: JSON.stringify({
                    session,
                    class_name: classKey,
                    incharge: teacher
                })
            });
            const data = await res.json().catch(() => ({}));
            if (res.ok && data?.success !== false) success += 1;
            else failed += 1;
        }catch(_){
            failed += 1;
        }
    }

    statusNote.textContent = `Auto-assign complete: Saved ${success}, Skipped ${skipped}, Failed ${failed}`;
}

// RENDER TABLE
function renderTable() {

    theadRow.innerHTML = "<th>Class</th>" + periods.map(p => `<th>${p}</th>`).join("");
    const rows = [];

    for (let cls of classes) {

        let rowHTML = `<tr><td><strong>${cls}</strong></td>`;

        for (let p of periods) {

            if (p === "Lunch") {
                rowHTML += `<td class="lunch-cell">Lunch</td>`;
                continue;
            }

            const periodNumber = periodMap[p];

            // FIX: get ALL records for this period
            const cells = timetableData[cls].filter(item => Number(item.period) === periodNumber);

            if (!cells.length) {
                rowHTML += `<td></td>`;
                continue;
            }

            let cellHTML = "";

            cells.forEach(cell => {
                let teacher = "";
                let subject = "";
                let days = [];

                weekDays.forEach(day => {
                    if (cell[day] && cell[day].includes(" - ")) {
                        const [t, s] = cell[day].split(" - ");
                        teacher = t;
                        subject = s;
                        days.push(day.slice(0, 3));
                    }
                });

                cellHTML += `
                    <div class="timetable-cell">
                        <span><strong>${teacher}</strong></span>
                        <span>${subject}</span>
                        <span>${days.join(",")}</span>
                    </div>
                    <hr>
                `;
            });

            rowHTML += `<td>${cellHTML}</td>`;
        }

        rowHTML += "</tr>";
        rows.push(rowHTML);
    }
    timetableBody.innerHTML = rows.join("");
}

function buildClassPage(cls){
    const wrap = document.createElement("div");
    wrap.style.width = "1120px";
    wrap.style.background = "#fff";
    wrap.style.padding = "14px";
    wrap.style.fontFamily = "Poppins, sans-serif";
    wrap.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div>
          <div style="font-size:18px;font-weight:700;">${SCHOOL_NAME}</div>
          <div style="font-size:12px;color:#475569;">Class Timetable</div>
        </div>
        <div style="text-align:right;font-size:12px;color:#475569;">
          Session: ${sessionSelect.value || "-"}<br>
          Class: ${cls}
        </div>
      </div>
    `;

    const table = document.createElement("table");
    table.style.width = "100%";
    table.style.borderCollapse = "collapse";
    table.style.fontSize = "11px";
    table.innerHTML = `
      <thead>
        <tr>
          <th style="border:1px solid #cbd5e1;padding:6px;background:#324a87;color:#fff;">Day</th>
          ${periods.map(p=>`<th style="border:1px solid #cbd5e1;padding:6px;background:#324a87;color:#fff;">${p}</th>`).join("")}
        </tr>
      </thead>
    `;
    const tbody = document.createElement("tbody");
    weekDays.forEach(day => {
        let row = `<tr><td style="border:1px solid #cbd5e1;padding:6px;background:#f8fafc;font-weight:600;">${day}</td>`;
        periods.forEach(p=>{
            if(p==="Lunch"){
                row += `<td style="border:1px solid #cbd5e1;padding:6px;text-align:center;background:#f0f0f0;font-weight:600;">Lunch</td>`;
                return;
            }
            const periodNum = periodMap[p];
            const items = (timetableData[cls] || []).filter(item => Number(item.period) === periodNum);
            const lines = [];
            items.forEach(item => {
                const v = item[day] || "";
                if(v && v.includes(" - ")){
                    lines.push(v);
                }
            });
            row += `<td style="border:1px solid #cbd5e1;padding:6px;vertical-align:top;">${lines.join("<br>")}</td>`;
        });
        row += "</tr>";
        tbody.innerHTML += row;
    });
    table.appendChild(tbody);
    wrap.appendChild(table);
    return wrap;
}

function buildOfficeSummaryPages(){
    const pages = [];
    const chunkSize = 6; // 6 classes per page for office copy
    const dayShort = ["Mon","Tue","Wed","Thu","Fri","Sat"];
    const dayKey = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const formatDays = (set) => {
        return dayShort.map((d, idx) => set.has(dayKey[idx]) ? d : "---").join(",");
    };
    for(let i=0; i<classes.length; i+=chunkSize){
        const chunk = classes.slice(i, i+chunkSize);
        const wrap = document.createElement("div");
        wrap.style.width = "1100px";
        wrap.style.background = "#fff";
        wrap.style.padding = "14px";
        wrap.style.fontFamily = "Poppins, sans-serif";
        wrap.innerHTML = `
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <div>
              <div style="font-size:18px;font-weight:700;">${SCHOOL_NAME}</div>
              <div style="font-size:12px;color:#475569;">Office Copy - Class Summary</div>
            </div>
            <div style="text-align:right;font-size:12px;color:#475569;">
              Session: ${sessionSelect.value || "-"}<br>
              Page ${Math.floor(i/chunkSize)+1}
            </div>
          </div>
        `;

        const table = document.createElement("table");
        table.style.width = "100%";
        table.style.borderCollapse = "collapse";
        table.style.fontSize = "11px";
        table.style.tableLayout = "fixed";
        table.innerHTML = `
          <thead>
            <tr>
              <th style="border:1px solid #cbd5e1;padding:5px;background:#324a87;color:#fff;">Class</th>
              ${periods.map(p=>`<th style="border:1px solid #cbd5e1;padding:5px;background:#324a87;color:#fff;">${p}</th>`).join("")}
            </tr>
          </thead>
        `;
        const tbody = document.createElement("tbody");
        chunk.forEach(cls => {
            let row = `<tr><td style="border:1px solid #cbd5e1;padding:5px;background:#f8fafc;font-weight:600;word-break:break-word;">${cls}</td>`;
            periods.forEach(p=>{
                if(p==="Lunch"){
                    row += `<td style="border:1px solid #cbd5e1;padding:5px;text-align:center;background:#f0f0f0;font-weight:600;">Lunch</td>`;
                    return;
                }
                const periodNum = periodMap[p];
                const items = (timetableData[cls] || []).filter(item => Number(item.period) === periodNum);
                const grouped = new Map(); // key: teacher||subject -> Set(days)
                items.forEach(item => {
                    weekDays.forEach(day => {
                        const v = item[day] || "";
                        if(v && v.includes(" - ")){
                            const [t,s] = v.split(" - ");
                            const key = `${t}||${s}`;
                            if(!grouped.has(key)) grouped.set(key, new Set());
                            grouped.get(key).add(day);
                        }
                    });
                });
                const blocks = [];
                grouped.forEach((days, key) => {
                    const [t, s] = key.split("||");
                    blocks.push(`<div style="margin-bottom:6px;">
                        <div><b>${s}</b></div>
                        <div>${t}</div>
                        <div>${formatDays(days)}</div>
                    </div>`);
                });
                row += `<td style="border:1px solid #cbd5e1;padding:5px;vertical-align:top;word-break:break-word;">${blocks.join("")}</td>`;
            });
            row += "</tr>";
            tbody.innerHTML += row;
        });
        table.appendChild(tbody);
        wrap.appendChild(table);
        pages.push(wrap);
    }
    return pages;
}

async function downloadPDF(){
    if(!classes.length) return alert("No classes found.");
    const jsPDFCtor = window.jspdf && window.jspdf.jsPDF;
    if(!jsPDFCtor || typeof window.html2canvas === "undefined"){
        return alert("PDF library not loaded. Refresh and try again.");
    }
    const pdf = new jsPDFCtor("l", "pt", "a4");
    let first = true;
    const host = document.createElement("div");
    host.style.position = "fixed";
    host.style.left = "-99999px";
    host.style.top = "0";
    document.body.appendChild(host);
    try{
        for(const cls of classes){
            host.innerHTML = "";
            const page = buildClassPage(cls);
            host.appendChild(page);
            const canvas = await window.html2canvas(page, {scale:2, useCORS:true, backgroundColor:"#fff"});
            const img = canvas.toDataURL("image/jpeg", 0.95);
            const pageWidth = pdf.internal.pageSize.getWidth();
            const pageHeight = pdf.internal.pageSize.getHeight();
            const ratio = Math.min(pageWidth / canvas.width, pageHeight / canvas.height);
            const imgW = canvas.width * ratio;
            const imgH = canvas.height * ratio;
            if(!first) pdf.addPage();
            first = false;
            pdf.addImage(img, "JPEG", (pageWidth-imgW)/2, 20, imgW, imgH);
        }
        // Office copy summary at end (split across pages)
        const summaryPages = buildOfficeSummaryPages();
        for(const summary of summaryPages){
            host.innerHTML = "";
            host.appendChild(summary);
            const canvas = await window.html2canvas(summary, {scale:2, useCORS:true, backgroundColor:"#fff"});
            const img = canvas.toDataURL("image/jpeg", 0.95);
            const pageWidth = pdf.internal.pageSize.getWidth();
            const pageHeight = pdf.internal.pageSize.getHeight();
            const ratio = Math.min(pageWidth / canvas.width, pageHeight / canvas.height);
            const imgW = canvas.width * ratio;
            const imgH = canvas.height * ratio;
            pdf.addPage();
            pdf.addImage(img, "JPEG", (pageWidth-imgW)/2, 20, imgW, imgH);
        }
        pdf.save(`class_timetable_${sessionSelect.value || "session"}.pdf`);
    }catch(e){
        console.error(e);
        alert("Unable to generate PDF.");
    }finally{
        if(host.parentNode) host.parentNode.removeChild(host);
    }
}

// INIT
async function init() {
    await loadSessions();
    await loadClasses();

    sessionSelect.onchange = async () => {
        localStorage.setItem("session", sessionSelect.value || "");
        await loadClasses();
        await loadTimetable();
        renderTable();
    };

    await loadTimetable();
    renderTable();
}

init();
</script>

</body>
</html>
