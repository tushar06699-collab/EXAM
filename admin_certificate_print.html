<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Certificate Print</title>
  <style>
    @page { size: A4 portrait; margin: 0; }
    * { box-sizing: border-box; }
    :root {
      --page-scale: 1.18;
    }
    html, body {
      width: 100%;
      height: 100%;
    }
    body {
      margin: 0;
      font-family: Poppins, Arial, sans-serif;
      color: #111827;
      background: #fff;
    }
    .page-canvas {
      width: 210mm;
      height: 297mm;
      overflow: hidden;
      position: relative;
      background: #fff;
      page-break-after: always;
      break-after: page;
    }
    .page-canvas:last-child{
      page-break-after: auto;
      break-after: auto;
    }
    .sheet {
      position: relative;
      border: 2px solid #d7b25d;
      width: calc(210mm / var(--page-scale));
      height: calc(297mm / var(--page-scale));
      padding: 14mm 12mm 14mm;
      display: flex;
      flex-direction: column;
      margin: 0;
      zoom: var(--page-scale);
    }
    .sheet::before {
      content: "";
      position: absolute;
      inset: 7mm;
      border: 1.5px solid #233465;
      pointer-events: none;
    }
    .watermark {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 100px;
      font-weight: 800;
      color: #233465;
      opacity: .06;
      transform: rotate(-28deg);
      pointer-events: none;
      letter-spacing: 3px;
    }
    .content {
      position: relative;
      z-index: 1;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      flex: 1 1 auto;
    }
    .school { text-align: center; margin-bottom: 26px; }
    .school h1 {
      margin: 0;
      color: #1e40af;
      font-size: 34px;
      font-weight: 800;
    }
    .school p {
      margin: 5px 0;
      font-size: 16px;
      color: #334155;
    }
    .title {
      text-align: center;
      margin: 20px 0 28px;
    }
    .title span {
      display: inline-block;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 1px;
      padding-bottom: 8px;
      border-bottom: 3px solid #233465;
    }
    .meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 28px;
      font-size: 16px;
      color: #1f2937;
    }
    .body {
      font-size: 23px;
      line-height: 2;
      text-align: justify;
      flex: 1 1 auto;
    }
    .body p {
      margin: 0 0 28px;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin-top: auto;
      padding-top: 42px;
      align-items: flex-end;
    }
    .signature {
      min-width: 280px;
      text-align: center;
    }
    .signature .line {
      border-top: 1px solid #111827;
      margin-top: 40px;
      padding-top: 10px;
      font-weight: 700;
      font-size: 18px;
    }
    .place {
      font-size: 18px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="printRoot"></div>

  <template id="certificateTemplate">
    <div class="page-canvas">
      <div class="sheet">
        <div class="watermark">SCHOOL ERP</div>
        <div class="content">
          <div class="school">
            <h1>P.S. Public School</h1>
            <p>Recognized Senior Secondary School</p>
            <p>Certificate generated by School ERP Administration</p>
          </div>
          <div class="title"><span data-role="title">CERTIFICATE</span></div>
          <div class="meta">
            <div><strong>Ref No:</strong> <span data-role="ref">-</span></div>
            <div><strong>Date:</strong> <span data-role="date">-</span></div>
          </div>
          <div class="body" data-role="body"></div>
          <div class="footer">
            <div class="place"><strong>Place:</strong> School Office</div>
            <div class="signature">
              <div class="line">Principal / Authorized Signatory</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </template>

  <script>
    function escapeHtml(value){
      return String(value ?? "").replace(/[&<>"']/g, function(ch){
        return ({
          "&":"&amp;",
          "<":"&lt;",
          ">":"&gt;",
          "\"":"&quot;",
          "'":"&#39;"
        })[ch];
      });
    }

    try{
      const raw = sessionStorage.getItem("certificate_print_payload");
      const payload = raw ? JSON.parse(raw) : {};
      const certificates = Array.isArray(payload.certificates) ? payload.certificates : [];
      const root = document.getElementById("printRoot");
      const template = document.getElementById("certificateTemplate");

      certificates.forEach(function(cert){
        const node = template.content.firstElementChild.cloneNode(true);
        node.querySelector('[data-role="title"]').textContent = cert.title || "CERTIFICATE";
        node.querySelector('[data-role="ref"]').textContent = cert.refNo || "-";
        node.querySelector('[data-role="date"]').textContent = cert.issuedOn || "-";
        const body = node.querySelector('[data-role="body"]');
        const paragraphs = Array.isArray(cert.paragraphs) ? cert.paragraphs : [];
        paragraphs.forEach(function(paragraph){
          const p = document.createElement("p");
          p.innerHTML = escapeHtml(paragraph).replace(/\n/g, "<br>");
          body.appendChild(p);
        });
        root.appendChild(node);
      });
    }catch(_e){}

    window.onload = function(){
      window.focus();
      window.print();
      setTimeout(function(){
        try{ window.close(); }catch(_e){}
      }, 300);
    };
  </script>
</body>
</html>
